  const packAll=t.packing.flatMap(l=>l.items);
  const packPct=packAll.length?Math.round(packAll.filter(i=>i.checked).length/packAll.length*100):0;
  const todayEvents=(()=>{ for(const d of t.destinations){ const dd=d.days.find(x=>x.date===today); if(dd) return {dest:d,day:dd}; } return null; })();
  html+=`<div class="tile-grid">
    ${nxHtml}
    <div class="tile">
      <div class="t-top"><span class="t-ico" style="background:rgba(14,155,181,.14);color:#0E9BB5">${ic('clock',19)}</span></div>
      <div class="t-num">${pr.status==='ongoing'?(pr.total-pr.current):(pr.status==='upcoming'?diffDays(today,pr.start):0)}</div>
      <div class="t-lbl">${pr.status==='ongoing'?'ימים נותרו בטיול':(pr.status==='upcoming'?'ימים ליציאה':'הטיול הסתיים')}</div>
      <div class="t-sub">${fmtD(pr.start)} – ${fmtD(pr.end)}</div>
    </div>
    <div class="tile press" onclick="homeGoToday()">
      <div class="t-top"><span class="t-ico" style="background:var(--accent-soft);color:var(--accent-ink)">${ic('calendar',19)}</span></div>
      <div class="t-num">${todayEvents?todayEvents.day.events.length:0}</div>
      <div class="t-lbl">בלו״ז היום</div><div class="t-sub">מעבר ליום הנוכחי</div>
    </div>
    <div class="tile press" onclick="go('budget')">
      <div class="t-top"><span class="t-ico" style="background:rgba(224,164,23,.14);color:#E0A417">${ic('wallet',19)}</span></div>
      <div class="t-num">${money(b.act)}</div>
      <div class="t-lbl">הוצא עד כה</div><div class="t-sub">${t.budgetTotal?('מתוך '+money(t.budgetTotal)):'ללא תקציב מוגדר'}</div>
    </div>
    <div class="tile press" onclick="UI.moreView='packing'; UI.screen='more'; render()">
      <div class="t-top"><span class="t-ico" style="background:var(--green-soft);color:var(--green)">${ic('bag',19)}</span></div>
      <div class="t-num">${packPct}%</div>
      <div class="t-lbl">אריזה</div>
      <div class="progress" style="height:5px;margin-top:7px"><div style="width:${packPct}%;background:var(--green)"></div></div>
    </div>
  </div>`;
  /* today's schedule */
  if(todayEvents && todayEvents.day.events.length){
    html+=`<div class="section-label">${ic('clock',14)} הלו״ז של היום</div><div class="card" style="padding:2px 14px">`;
    todayEvents.day.events.slice(0,4).forEach(e=>{
      const ty=evType(e.type);
      html+=`<div class="list-row" onclick="homeOpenEv('${todayEvents.dest.id}','${todayEvents.day.id}','${e.id}')">
        <span class="lr-ic" style="background:${ty.color}1e;color:${ty.color}">${ic(ty.icon,18)}</span>
        <div class="lr-body"><div class="lr-title" style="${e.status==='done'?'text-decoration:line-through;color:var(--ink3)':''}">${esc(e.title)}</div>
        <div class="lr-sub">${e.time?e.time+' · ':''}${ty.label}</div></div>
        ${e.status==='done'?'<span class="status-pill st-done">בוצע</span>':''}
      </div>`;
    });
    if(todayEvents.day.events.length>4)
      html+=`<div class="list-row" onclick="homeGoToday()" style="justify-content:center"><b style="color:var(--accent-ink);font-size:13.5px">לכל ${todayEvents.day.events.length} האירועים ←</b></div>`;
    html+=`</div>`;
    const hasFlight=todayEvents.day.events.some(e=>e.type==='flight');
    const hasHotel=todayEvents.day.events.some(e=>e.type==='hotel');
    if(hasFlight||hasHotel){
      html+=`<div class="chips" style="margin-top:10px">
        ${hasFlight?`<button class="chip" onclick="UI.docFolder='flights'; go('docs')">${ic('flight',15)} מסמכי טיסה להיום</button>`:''}
        ${hasHotel?`<button class="chip" onclick="UI.docFolder='hotels'; go('docs')">${ic('hotel',15)} אישורי מלון</button>`:''}
      </div>`;
    }
  }
  /* shortcuts */
  const insights=Assistant.analyze(t);
  const rem=buildReminders(t).filter(r=>r.date>=today && !S.settings.remOff[r.id]);
  const shortcuts=[
    {act:"navSub('map','home')", icon:'map', color:'#0E9BB5', l:'מפה'},
    {act:"navSub('wallet','home')", icon:'wallet', color:'#8250DF', l:'ארנק'},
    {act:"navSub('journal','home')", icon:'camera', color:'#C0399F', l:'יומן'},
    {act:"navSub('wishlist','home')", icon:'star', color:'#E0A417', l:'משאלות', n:t.wishlist.length||''},
    {act:"navSub('assistant','home')", icon:'spark', color:'#6741D9', l:'עוזר', n:insights.length||''},
    {act:"navSub('reminders','home')", icon:'bell', color:'#E8590C', l:'תזכורות', n:rem.length||''},
    {act:"go('docs')", icon:'folder', color:'#7A8699', l:'מסמכים'}
  ];
  html+=`<div class="section-label">${ic('grid',14)} קיצורים</div>
  <div class="tile-grid" style="grid-template-columns:repeat(auto-fit,minmax(74px,1fr))">${shortcuts.map(s=>`
    <div class="tile press" style="padding:12px 6px;text-align:center" onclick="${s.act}">
      <span class="t-ico" style="background:${s.color}1e;color:${s.color};margin:0 auto 7px;position:relative">${ic(s.icon,18)}
        ${s.n?`<span style="position:absolute;top:-5px;inset-inline-end:-5px;background:var(--red);color:#fff;font-size:9.5px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px">${s.n}</span>`:''}
      </span>
      <div style="font-size:11.5px;font-weight:700">${s.l}</div>
    </div>`).join('')}</div>`;
  /* multi-trip: quick switch + create from the dashboard */
  html+=`<div class="section-label" style="margin-top:18px">${ic('map',14)} הטיולים שלי (${S.trips.length})</div>
  <div class="chips" id="homeTrips" style="padding-bottom:4px">
    ${S.trips.map(x=>{
      const on=x.id===t.id, xd=tripDates(x);
      return `<button class="chip ${on?'active':''}" onclick="S.activeTripId='${x.id}';save();render()">${esc(x.name)}${xd.start?`<span style="opacity:.65;font-size:10.5px"> · ${fmtD(xd.start)}</span>`:''}</button>`;
    }).join('')}
    <button class="chip" style="border-style:dashed;color:var(--accent-ink)" onclick="openTripForm()">＋ טיול חדש</button>
  </div>`;

  return html;
}
function homeGoToday(){
  const t=activeTrip(); if(!t) return;
  const today=todayStr();
  for(const d of t.destinations){ const dd=d.days.find(x=>x.date===today); if(dd){ UI.destId=d.id; UI.dayId=dd.id; break; } }
  go('itinerary');
}
function homeOpenEv(destId,dayId,evId){
  UI.destId=destId; UI.dayId=dayId;
  go('itinerary');
  openEventDetail(evId);
}

  const filters=[{id:'all',label:'הכל',icon:'map',color:'var(--ink)'},...MAP_TYPES.map(id=>{const ty=evType(id);return {id,label:ty.label,icon:ty.icon,color:ty.color};})];

      <path d="M-10,206 C80,186 150,238 230,212 S360,176 410,200 L410,300 L-10,300 Z" fill="#BFD9EA"/>
      <path d="M-10,70 L410,110" stroke="#fff" stroke-width="10" fill="none"/>
      <path d="M120,-10 L180,310" stroke="#fff" stroke-width="10" fill="none"/>
      <path d="M-10,160 L410,140" stroke="#fff" stroke-width="6" fill="none"/>
      <path d="M280,-10 L250,310" stroke="#fff" stroke-width="6" fill="none"/>
    </svg>
    ${pins}
    <span class="demo-tag map-note">מפת המחשה · חיבור Google / Apple Maps בהמשך</span>
  </div>`;
  if(!items.length) html+=`<p class="mini-note" style="text-align:center">אין עדיין מקומות מסוג זה ב${esc(dest.name)} — הוסף מלונות, מסעדות ואטרקציות במסלול</p>`;
  else{
    html+=`<div class="section-label">${ic('pin',14)} במפה (${items.length})</div><div class="card" style="padding:2px 14px">`;
    items.forEach(({e,day})=>{
      const ty=evType(e.type);
      html+=`<div class="list-row" onclick="mapOpenEv('${dest.id}','${day.id}','${e.id}')">
        <span class="lr-ic" style="background:${ty.color}1e;color:${ty.color}">${ic(ty.icon,18)}</span>
        <div class="lr-body"><div class="lr-title">${esc(e.title)}</div>
        <div class="lr-sub">${fmtD(day.date)}${e.address?' · '+esc(e.address.slice(0,30)):''}</div></div>
        ${ic('chevL',16)}
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

}

/* ---- TRAVEL WALLET ---- */
function screenWallet(){
  const t=activeTrip();
  let html=topBar('ארנק נסיעות', t?esc(t.name):'', subBack());
  if(!t) return html+emptyState('wallet','אין טיול פעיל','בחר טיול כדי לפתוח את הארנק','');
  /* emergency contacts */
  html+=`<div class="section-label">${ic('phone',14)} אנשי קשר לחירום</div><div class="card" style="padding:2px 14px">`;
  if(!t.contacts.length) html+=`<div class="list-row" style="cursor:default"><span class="mini-note" style="margin:0">שגרירות, ביטוח, משפחה — שיהיה זמין ברגע האמת</span></div>`;
  t.contacts.forEach(c=>{
    html+=`<div class="list-row" style="cursor:default">
      <span class="lr-ic contact-ic">${ic('user',18)}</span>
      <div class="lr-body"><div class="lr-title">${esc(c.name)}</div><div class="lr-sub">${esc(c.note||'')}</div></div>
      <a class="icon-btn" style="text-decoration:none" href="tel:${esc(c.phone)}">${ic('phone',16)}</a>
      <button class="icon-btn plain danger" onclick="deleteContact('${c.id}')">${ic('trash',16)}</button>
    </div>`;
  });
  html+=`</div><button class="btn btn-soft btn-block btn-sm" style="margin-top:10px" onclick="openContactForm()">${ic('plus',15)} הוספת איש קשר</button>`;
  /* hotel bookings */
  html+=`<div class="section-label">${ic('hotel',14)} הזמנות מלון</div><div class="card" style="padding:2px 14px">`;
  if(!(t.hotels||[]).length) html+=`<div class="list-row" style="cursor:default"><span class="mini-note" style="margin:0">הזמנה אחת לכל שהות — מופיעה אוטומטית בכל הימים הרלוונטיים</span></div>`;
  (t.hotels||[]).forEach(b=>{
    html+=`<div class="list-row" onclick="openHotelDetail('${b.id}')">
      <span class="lr-ic" style="background:rgba(130,80,223,.12);color:#8250DF">${ic('hotel',18)}</span>
      <div class="lr-body"><div class="lr-title">${esc(b.name)}</div>

      ${ic('chevL',16)}
    </div>`;
  });
  html+=`</div><button class="btn btn-soft btn-block btn-sm" style="margin-top:10px" onclick="openHotelForm()">${ic('plus',15)} הוספת הזמנת מלון</button>`;
  /* flights */
  const flights=allEvents(t).filter(x=>x.e.type==='flight');
  if(flights.length){
    html+=`<div class="section-label">${ic('flight',14)} טיסות ומעקב</div><div class="card" style="padding:2px 14px">`;
    flights.forEach(({e,day})=>{
      const st=FlightService.status(e.bookingRef||e.title, day.date);
      html+=`<div class="list-row" onclick="openFlightTracker('${e.id}')">
        <span class="lr-ic" style="background:rgba(62,99,221,.12);color:#3E63DD">${ic('flight',18)}</span>
        <div class="lr-body"><div class="lr-title">${esc(e.title)}</div>
        <div class="lr-sub">${fmtD(day.date)}${e.time?' · '+e.time:''}${e.gate?' · שער '+esc(e.gate):''}</div></div>
        <span class="status-pill" style="background:color-mix(in srgb, ${st.color} 14%, transparent);color:${st.color}">${st.label}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  /* reservations */
  const resv=allEvents(t).filter(x=>x.e.bookingRef && x.e.type!=='flight');
  if(resv.length){
    html+=`<div class="section-label">${ic('ticket',14)} הזמנות ואישורים</div><div class="card" style="padding:2px 14px">`;
    resv.forEach(({e,day,dest})=>{
      const ty=evType(e.type);
      html+=`<div class="list-row" onclick="homeOpenEv('${dest.id}','${day.id}','${e.id}')">
        <span class="lr-ic" style="background:${ty.color}1e;color:${ty.color}">${ic(ty.icon,18)}</span>
        <div class="lr-body"><div class="lr-title">${esc(e.title)}</div>
        <div class="lr-sub">${fmtD(day.date)} · אסמכתא ${esc(e.bookingRef)}</div></div>
        ${ic('chevL',16)}
      </div>`;
    });
    html+=`</div>`;
  }
  /* documents by wallet folders */
  const walletFolders=['passport','flights','hotels','insurance','restaurants'];
  html+=`<div class="section-label">${ic('folder',14)} המסמכים שלי</div>`;
  walletFolders.forEach(fid=>{
    const f=DOC_FOLDERS.find(x=>x.id===fid);
    const docs=S.docs.filter(d=>d.folder===fid && (!d.tripId || d.tripId===t.id));
    html+=`<div class="card pad" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${docs.length?'10px':'0'}">

        <button class="btn btn-soft btn-sm" onclick="walletUpload('${fid}')">${ic('upload',14)} הוסף</button>
      </div>
      ${docs.length?`<div style="display:flex;flex-wrap:wrap;gap:7px">${docs.map(d=>`
        <a class="doc-chip" style="font-size:12px;padding:6px 11px" onclick="openDoc('${d.id}',false)">${ic(d.type.startsWith('image')?'camera':'file',13)} ${esc(d.name.length>22?d.name.slice(0,22)+'…':d.name)}</a>`).join('')}</div>`
      :`<p class="mini-note" style="margin-top:6px">אין עדיין מסמכים בתיקייה זו</p>`}
    </div>`;
  });
  return html;
}

function saveContact(){
  const t=activeTrip(); if(!t) return;
  const name=document.getElementById('cf-name').value.trim();
  const phone=document.getElementById('cf-phone').value.trim();
  if(!name||!phone){ toast('מלא שם וטלפון'); return; }
  t.contacts.push({id:uid(), name, phone, note:document.getElementById('cf-note').value.trim()});
  save('נשמר'); closeSheet(); render();
}
async function deleteContact(id){
  const t=activeTrip();
  t.contacts=t.contacts.filter(c=>c.id!==id);
  save('נמחק'); render();
}

<script>
/* ==== SHARE CORE ==== */
/* ============================================================
   הגדרות סנכרון ענן (Supabase)
   אפשרות א׳: הדבק כאן את הפרטים —
     SUPABASE_URL:      https://xxxx.supabase.co
     SUPABASE_ANON_KEY: המפתח הציבורי (anon)
   אפשרות ב׳ (מומלץ): הגדרות ← סנכרון ענן — בלי לגעת בקוד.
   הוראות הקמה מלאות: הגדרות ← סנכרון ענן ← הוראות התקנה.
   ============================================================ */
const SYNC_CONFIG={ SUPABASE_URL:'https://pcbbbfwbhilqycadzztm.supabase.co', SUPABASE_ANON_KEY:'sb_publishable_sOK2c2HuqE1W_Fu_V23nfQ_2Fv_sJv2' };
function sbConf(){
  /* הפרטים המוטמעים הם המקור היחיד כשהם קיימים — override ישן מההגדרות לא יכול להסתיר אותם */
  if(SYNC_CONFIG.SUPABASE_URL && SYNC_CONFIG.SUPABASE_ANON_KEY){
    return { url:SYNC_CONFIG.SUPABASE_URL.trim().replace(/\/+$/,''), key:SYNC_CONFIG.SUPABASE_ANON_KEY.trim() };
  }
  const c=(S.settings&&S.settings.sb)||{};
  const url=String(c.url||'').trim().replace(/\/+$/,'');
  const key=String(c.key||'').trim();
  return (url&&key)?{url,key}:null;
}
const SupabaseTransport={
  name:'supabase', label:'ענן (Supabase)',
  available(){ return !!sbConf(); },
  hdr(extra){ const c=sbConf(); return Object.assign({'apikey':c.key,'Authorization':'Bearer '+c.key,'Content-Type':'application/json'},extra||{}); },
  async get(code){
    const c=sbConf();
    const r=await fetch(c.url+'/rest/v1/shared_trips?code=eq.'+encodeURIComponent(code)+'&select=payload',{headers:this.hdr()});
    if(!r.ok) throw new Error('Supabase HTTP '+r.status);
    const a=await r.json();
    if(!a.length) return null;
    const p=a[0].payload;
    return typeof p==='string'?p:JSON.stringify(p);
  },
  async set(code,str){
    const c=sbConf();
    const r=await fetch(c.url+'/rest/v1/shared_trips?on_conflict=code',{
      method:'POST',
      headers:this.hdr({'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify([{code, payload:JSON.parse(str)}])
    });
    if(!r.ok) throw new Error('Supabase HTTP '+r.status);
    return true;
  },
  async del(code){
    const c=sbConf();
    await fetch(c.url+'/rest/v1/shared_trips?code=eq.'+encodeURIComponent(code),{method:'DELETE',headers:this.hdr()});
  },
  async getBlob(code,key){
    const c=sbConf();
    const r=await fetch(c.url+'/rest/v1/shared_blobs?code=eq.'+encodeURIComponent(code)+'&key=eq.'+encodeURIComponent(key)+'&select=value',{headers:this.hdr()});
    if(!r.ok) throw new Error('Supabase HTTP '+r.status);
    const a=await r.json();
    return a.length?a[0].value:null;
  },
  async setBlob(code,key,val){
    const c=sbConf();
    const r=await fetch(c.url+'/rest/v1/shared_blobs?on_conflict=code,key',{
      method:'POST',
      headers:this.hdr({'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify([{code,key,value:val}])
    });
    if(!r.ok) throw new Error('Supabase HTTP '+r.status);
    return true;
  },
  async delBlob(code,key){
    const c=sbConf();
    await fetch(c.url+'/rest/v1/shared_blobs?code=eq.'+encodeURIComponent(code)+'&key=eq.'+encodeURIComponent(key),{method:'DELETE',headers:this.hdr()});
  }
};
const ArtifactTransport={
  name:'artifact', label:'אחסון משותף של Claude',
  available(){ return !!(window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function'); },
  async get(code){ try{ const r=await window.storage.get('shr-'+code,true); return (r&&typeof r.value==='string')?r.value:null; }catch(e){ return null; } },
  async set(code,str){ const r=await window.storage.set('shr-'+code,str,true); if(!r) throw new Error('artifact set failed'); return true; },
  async del(code){ try{ await window.storage.delete('shr-'+code,true); }catch(e){} },
  async getBlob(code,key){ try{ const r=await window.storage.get('sb-'+code+'-'+key,true); return (r&&typeof r.value==='string')?r.value:null; }catch(e){ return null; } },
  async setBlob(code,key,val){ const r=await window.storage.set('sb-'+code+'-'+key,val,true); if(!r) throw new Error('artifact blob failed'); return true; },
  async delBlob(code,key){ try{ await window.storage.delete('sb-'+code+'-'+key,true); }catch(e){} }
};
function syncTransport(){
  if(SupabaseTransport.available()) return SupabaseTransport;
  if(ArtifactTransport.available()) return ArtifactTransport;
  return null;
}
const SHARE_CHARS='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
function genShareCode(len){ len=len||8; let c=''; for(let i=0;i<len;i++) c+=SHARE_CHARS[Math.floor(Math.random()*SHARE_CHARS.length)]; return c; }
function stripForShare(t){ const c=JSON.parse(JSON.stringify(t)); delete c.share; return c; }
function docsForTrip(tripId){ return S.docs.filter(d=>d.tripId===tripId); }
function collectBlobKeys(t){
  const keys=[];
  t.destinations.forEach(d=>d.days.forEach(day=>(day.journal&&day.journal.photos||[]).forEach(p=>keys.push(p.key))));
  return keys;
}
function shareFingerprint(t){ return hsh(JSON.stringify(stripForShare(t))+JSON.stringify(docsForTrip(t.id))); }
function buildSharePayload(t){
  return {v:2, rev:(t.share.rev||0)+1, by:S.settings.deviceId, updatedAt:Date.now(),
    trip:stripForShare(t), docs:docsForTrip(t.id),
    blobKeys:collectBlobKeys(t).concat(docsForTrip(t.id).map(d=>d.key))};
}
/* merge two versions of the same trip — newer updatedAt wins field conflicts,
   additions from BOTH sides survive (never lose local unsynced work) */
function unionById(target,extra){
  const ids=new Set((target||[]).map(x=>x&&x.id));
  (extra||[]).forEach(x=>{ if(x&&x.id&&!ids.has(x.id)) target.push(JSON.parse(JSON.stringify(x))); });
  return target;
}
function mergeTrips(a,b){
  const primary=((a.updatedAt||0)>=(b.updatedAt||0))?a:b;
  const secondary=(primary===a)?b:a;
  const m=JSON.parse(JSON.stringify(primary));
  const secD={}; (secondary.destinations||[]).forEach(d=>secD[d.id]=d);
  (m.destinations||[]).forEach(d=>{
    const sd=secD[d.id]; if(!sd) return;
    const sDays={}; (sd.days||[]).forEach(x=>sDays[x.date]=x);
    (d.days||[]).forEach(day=>{
      const sday=sDays[day.date]; if(!sday) return;
      unionById(day.events=day.events||[], sday.events);
      if(day.journal && sday.journal) unionById(day.journal.photos=day.journal.photos||[], sday.journal.photos);
    });
  });
  unionById(m.destinations=m.destinations||[], secondary.destinations);
  unionById(m.expenses=m.expenses||[], secondary.expenses);
  unionById(m.wishlist=m.wishlist||[], secondary.wishlist);
  unionById(m.contacts=m.contacts||[], secondary.contacts);
  unionById(m.customReminders=m.customReminders||[], secondary.customReminders);
  unionById(m.hotels=m.hotels||[], secondary.hotels);
  const secP={}; (secondary.packing||[]).forEach(l=>secP[l.id]=l);
  (m.packing=m.packing||[]).forEach(l=>{ const sl=secP[l.id]; if(sl) unionById(l.items=l.items||[], sl.items); });
  unionById(m.packing, secondary.packing);
  m.updatedAt=Math.max(a.updatedAt||0, b.updatedAt||0);
  return m;
}
function mergeDocs(localDocs,remoteDocs,localIsNewer){
  const primary=localIsNewer?localDocs:remoteDocs;
  const secondary=localIsNewer?remoteDocs:localDocs;
  const out=JSON.parse(JSON.stringify(primary||[]));
  unionById(out,secondary||[]);
  return out;
}
function adoptSharedTrip(payload, code, role, keepPushed){
  const remote=payload.trip;
  remote.share={code, rev:payload.rev, role:role||'guest', pushedKeys:keepPushed||[]};
  const i=S.trips.findIndex(x=>x.id===remote.id);
  if(i>=0) S.trips[i]=remote; else S.trips.unshift(remote);
  S.docs=S.docs.filter(d=>d.tripId!==remote.id).concat(payload.docs||[]);
  return remote;
}
async function fetchMissingBlobs(code, keys){
  const T=syncTransport(); if(!T) return;
  for(const k of (keys||[])){
    try{
      const have=await FileStore.get(k);
      if(have) continue;
      const v=await T.getBlob(code,k);
      if(typeof v==='string') await FileStore.put(k,v);
    }catch(e){}
  }
}
async function pushBlobs(t){
  const T=syncTransport(); if(!T) return;
  const code=t.share.code;
  const keys=collectBlobKeys(t).concat(docsForTrip(t.id).map(d=>d.key));
  t.share.pushedKeys=t.share.pushedKeys||[];
  for(const k of keys){
    if(t.share.pushedKeys.includes(k)) continue;
    const v=await FileStore.get(k);
    if(!v) continue;
    await T.setBlob(code,k,v);
    t.share.pushedKeys.push(k);
  }
}
const ShareSync={
  interval:6000, timer:null, busy:false, pushT:null,
  lastHash:{}, status:{},
  available(){ return !!syncTransport(); },
  transportLabel(){ const T=syncTransport(); return T?T.label:''; },
  sharedTrips(){ return S.trips.filter(t=>t.share && t.share.code); },
  isOffline(e){
    if(typeof navigator!=='undefined' && navigator && navigator.onLine===false) return true;
    return !!(e && (e.name==='TypeError' || /fetch|network/i.test(String(e.message||''))));
  },
  label(code){
    const st=this.status[code];
    if(!st) return '⇄ משותף';
    if(st.state==='syncing') return '⟳ מסנכרן…';
    if(st.state==='offline') return '⌁ לא מקוון';
    if(st.state==='error') return '⚠ שגיאת סנכרון';
    return '✓ מסונכרן';
  },
  setStatus(code,state){
    this.status[code]={state, at:Date.now()};
    document.querySelectorAll('[data-shp="'+code+'"]').forEach(el=>el.textContent=this.label(code));
  },
  start(){
    if(this.timer || !this.available()) return;
    this.timer=setInterval(()=>this.tick(), this.interval);
    document.addEventListener('visibilitychange',()=>{ if(!document.hidden) this.tick(); });
    window.addEventListener('online',()=>this.tick());
    window.addEventListener('offline',()=>{ this.sharedTrips().forEach(t=>this.setStatus(t.share.code,'offline')); });
    this.tick();
  },
  schedulePush(){
    if(!this.available() || !this.sharedTrips().length) return;
    clearTimeout(this.pushT);
    this.pushT=setTimeout(()=>this.pushDirty(), 1200);
  },
  async tick(){
    if(this.busy || !this.available()) return;
    this.busy=true;
    try{
      for(const t of this.sharedTrips()) await this.pull(t);
      await this.pushDirty();
    }finally{ this.busy=false; }
  },
  async pull(t){
    const code=t.share.code;
    const T=syncTransport(); if(!T) return;
    let str=null;
    try{ str=await T.get(code); }
    catch(e){ this.setStatus(code, this.isOffline(e)?'offline':'error'); return; }
    if(str==null) return;
    let p; try{ p=JSON.parse(str); }catch(e){ this.setStatus(code,'error'); return; }
    if(!(p.rev > (t.share.rev||0))){
      if(this.lastHash[code]===undefined) this.lastHash[code]=shareFingerprint(t);
      return;
    }
    if(p.by===S.settings.deviceId){ t.share.rev=p.rev; this.setStatus(code,'synced'); return; }
    this.setStatus(code,'syncing');
    try{
      const keep=t.share;
      const localDirty = this.lastHash[code]!==undefined && shareFingerprint(t)!==this.lastHash[code];
      if(localDirty){
        /* conflict: merge by updatedAt — never drop local unsynced additions */
        const localCopy=stripForShare(t);
        const merged=mergeTrips(localCopy, p.trip);
        const localNewer=(localCopy.updatedAt||0)>=(p.trip.updatedAt||p.updatedAt||0);
        merged.share={code, rev:p.rev, role:keep.role, pushedKeys:keep.pushedKeys||[]};
        const i=S.trips.findIndex(x=>x.id===merged.id);
        if(i>=0) S.trips[i]=merged; else S.trips.unshift(merged);
        const localDocsNow=docsForTrip(merged.id);
        S.docs=S.docs.filter(d=>d.tripId!==merged.id).concat(mergeDocs(localDocsNow, p.docs||[], localNewer));
        /* lastHash intentionally NOT updated → merged result is pushed as the next rev */
      }else{
        const adopted=adoptSharedTrip(p, code, keep.role, keep.pushedKeys);
        if(typeof ensureShapes==='function') ensureShapes();
        this.lastHash[code]=shareFingerprint(adopted);
      }
      if(typeof ensureShapes==='function') ensureShapes();
      await fetchMissingBlobs(code, p.blobKeys);
      save();
      if(S.activeTripId===(p.trip&&p.trip.id) || UI.screen==='trips') render();
      this.setStatus(code, localDirty?'syncing':'synced');
      if(localDirty) this.schedulePush();
    }catch(e){ this.setStatus(code, this.isOffline(e)?'offline':'error'); }
  },
  async pushDirty(){
    for(const t of this.sharedTrips()){
      const fp=shareFingerprint(t);
      if(this.lastHash[t.share.code]===fp) continue;
      await this.push(t, fp);
    }
  },
  async push(t, fp){
    const code=t.share.code;
    this.setStatus(code,'syncing');
    try{
      await pushBlobs(t);
      const payload=buildSharePayload(t);
      const T=syncTransport(); if(!T) throw new Error('no transport');
      await T.set(code, JSON.stringify(payload));
      t.share.rev=payload.rev;
      this.lastHash[code]=fp!=null?fp:shareFingerprint(t);
      this.setStatus(code,'synced');
    }catch(e){
      this.setStatus(code, this.isOffline(e)?'offline':'error');
      warnOnce('sharepush','סנכרון השיתוף נכשל',e);
    }
  }
};
/* ==== END SHARE CORE ==== */

async function shareTripStart(tripId){
  const t=tripById(tripId); if(!t) return;
  if(!ShareSync.available()){ exportTripFile(tripId); return; }
  t.share={code:genShareCode(), rev:0, role:'owner', pushedKeys:[]};
  save();
  ShareSync.setStatus(t.share.code,'syncing');
  await ShareSync.push(t);
  ShareSync.start();
  openShareSheet(tripId);
  toast('הטיול משותף — שלח את הקוד');
}
function copyShareCode(code){
  const done=()=>toast('הקוד הועתק: '+code);
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(code).then(done).catch(()=>{ prompt('העתק את הקוד:', code); });
  else prompt('העתק את הקוד:', code);
}
function syncNow(){ ShareSync.tick(); toast('מסנכרן…'); }
async function stopSharing(tripId){
  closeSheet();
  const ok=await confirmDialog('השיתוף ייעצר לכולם. אצל כל משתתף יישאר עותק מקומי שלא ימשיך להתעדכן.',true);
  if(!ok) return;
  const t=tripById(tripId); if(!t||!t.share) return;
  const code=t.share.code;
  const T=syncTransport();
  if(T){
    try{ await T.del(code); }catch(e){}
    for(const k of (t.share.pushedKeys||[])){ try{ await T.delBlob(code,k); }catch(e){} }
  }
  delete t.share;
  save('השיתוף נעצר'); render();
}
async function leaveShare(tripId){
  closeSheet();

  if(!ok) return;
  const t=tripById(tripId); if(!t) return;
  delete t.share;
  save('נותקת מהשיתוף'); render();
}
function openShareHub(){

        <p class="mini-note" style="margin-top:8px">יוצרים קוד, שולחים לחבר — הוא מזין אותו למטה ומצטרף בדיוק לאותו טיול.</p>

    </div>`}
    <div class="field"><label>ייבוא טיול מקובץ</label>

async function joinByCode(){
  const inp=document.getElementById('join-code');
  const code=(inp.value||'').trim().toUpperCase();
  if(!/^[A-Z0-9]{6,8}$/.test(code)){ toast('קוד בן 6–8 תווים'); return; }
  if(typeof Auth==='undefined' || !Auth.session){
    closeSheet(); toast('קודם מתחברים לחשבון'); openAuthSheet(); return;
  }
  toast('בודק את הקוד…');
  let r;
  try{ r=await CloudAPI.redeemCode(code); }
  catch(e){
    console.error('[joinByCode]',e);
    toast('ההצטרפות נכשלה: '+sbErrorHe(e));
    if(sbIsSchemaError(e)){ closeSheet(); openCloudDoctor(); }
    return;
  }
  const st=r && r.status;
  if(st==='invalid'){ toast('קוד לא קיים — בדוק את התווים'); return; }
  if(st==='expired'){ toast('תוקף הקוד פג — בקש מבעל הטיול קוד חדש'); return; }
  if(st==='revoked'){ toast('הקוד בוטל על ידי בעל הטיול'); return; }
  if(st==='owner'){ closeSheet(); toast('זה טיול שבבעלותך 🙂'); return; }
  closeSheet();
  toast(st==='already'?'אתה כבר בטיול הזה — טוען…':'הצטרפת לטיול ✓ טוען…');
  await CloudSync.tick();
  const t=S.trips.find(x=>x.cloud && x.cloud.id===r.trip_id);
  if(t){ S.activeTripId=t.id; save(); navSub('home','trips'); }
}
function exportTripFile(tripId){
  const t=tripById(tripId); if(!t) return;
  const data={kind:'tiyulim-trip', v:1, exportedAt:Date.now(), trip:stripForShare(t), docs:docsForTrip(t.id)};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(t.name||'trip').replace(/[\\/:*?"<>|]/g,'-')+'.trip.json';
  a.click();
  toast('קובץ הטיול ירד — שלח אותו לצד השני');
}
function importTripFile(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const p=JSON.parse(r.result);
      if(p.kind!=='tiyulim-trip' || !p.trip) throw new Error('bad');
      const exists=tripById(p.trip.id);
      if(exists){
        const ok=await confirmDialog('טיול בשם "'+(p.trip.name||'')+'" כבר קיים אצלך — להחליף אותו בגרסה מהקובץ?',true);
        if(!ok) return;
      }
      const adopted=adoptSharedTrip({trip:p.trip, docs:p.docs||[], rev:0}, null, 'guest', []);
      delete adopted.share;
      S.activeTripId=adopted.id;
      ensureShapes();
      save('הטיול יובא ✓');
      closeSheet();
      navSub('home','trips');
    }catch(e){ toast('קובץ טיול לא תקין'); }
  };
  r.readAsText(f);
}
function appPublicUrl(){
  if(/^https?:$/.test(location.protocol)) return location.origin+location.pathname;
  return '';
}
async function shareAppLink(){
  const url=appPublicUrl();
  if(!url){
    openSheet('שיתוף האפליקציה', `
      <div class="card pad" style="background:var(--amber-soft);border-color:transparent">
        <b style="font-size:13.5px;color:var(--amber)">${ic('alert',15)} אין כאן קישור ציבורי</b>
        <p style="margin:5px 0 0;font-size:12.5px;color:var(--ink2)">שיתוף האפליקציה זמין כשמריצים אותה מהכתובת המקוונת (הגרסה המותקנת בטלפון). פתח אותה משם ושתף.</p>
      </div>`);
    return;
  }
  const text='Voyage — האפליקציה שאנחנו מתכננים איתה טיולים 🗺️';
  if(navigator.share){
    try{ await navigator.share({title:'Voyage', text, url}); return; }
    catch(e){ if(e && e.name==='AbortError') return; }
  }
  openSheet('שיתוף האפליקציה', `
    <div class="field"><label>קישור לאפליקציה</label>
      <input class="inp" readonly value="${esc(url)}" style="direction:ltr;font-size:13px" onclick="this.select()"></div>
    <button class="btn btn-primary btn-block" onclick="copyAppLink()">${ic('copy',16)} העתקת הקישור</button>
    <p class="mini-note">הקישור פותח את אותה אפליקציית ענן. מי שנכנס יוצר חשבון משלו ורואה חשבון ריק — הטיולים שלך נשארים פרטיים, אלא אם הזמנת אותו לטיול ספציפי.</p>`);
}
function copyAppLink(){
  const url=appPublicUrl();
  const done=()=>toast('הקישור הועתק ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done).catch(()=>prompt('העתק:',url));
  else prompt('העתק:',url);
}

  openShareHub, joinByCode, exportTripFile, importTripFile, shareAppLink, copyAppLink, ShareSync
});

/* ---- hotel booking form & detail ---- */
function recalcHotelNights(){
  const ci=document.getElementById('hf-in').value, co=document.getElementById('hf-out').value;

function saveHotelBooking(id){
  const t=activeTrip(); if(!t) return;
  const g=x=>document.getElementById(x).value;
  const name=g('hf-name').trim();
  const ci=g('hf-in'), co=g('hf-out');
  if(!name){ toast('תן שם למלון'); return; }
  if(!ci||!co||co<ci){ toast('בדוק את תאריכי הצ׳ק-אין/אאוט'); return; }
  const data={name, checkIn:ci, checkOut:co,
    checkInTime:g('hf-tin'), checkOutTime:g('hf-tout'),
    address:g('hf-addr').trim(), bookingRef:g('hf-ref').trim(),
    price:g('hf-price'), website:g('hf-web').trim(), phone:g('hf-phone').trim(),
    docId:g('hf-doc'), notes:g('hf-notes')};
  if(id){
    const b=(t.hotels||[]).find(x=>x.id===id);
    if(b) Object.assign(b,data);
  }else{
    t.hotels.push(Object.assign({id:uid()},data));

}

    </div>
    <p class="mini-note">מחיקה מסירה את השהות מכל הימים בטווח בבת אחת.</p>

<script>
/* ==== CLOUD CORE ==== */
/* Supabase מלא: אימות באימייל, נתונים בענן, שיתוף בהרשאות, Realtime.

function sbBase(){
  const c=sbConf(); if(!c) return null;
  return { url:c.url.replace(/\/rest\/v1\/?$/,''), key:c.key };
}
const Auth={
  session:null, SKEY:'tp-auth-v1',
  user(){ return this.session && this.session.user || null; },
  email(){ const u=this.user(); return u? (u.email||'') : ''; },
  token(){ return this.session? this.session.access_token : null; },
  loadCached(){
    try{ const raw=localStorage.getItem(this.SKEY); if(raw) this.session=JSON.parse(raw); }catch(e){}
  },
  persistSession(){
    try{ this.session? localStorage.setItem(this.SKEY, JSON.stringify(this.session)) : localStorage.removeItem(this.SKEY); }catch(e){}
  },
  _adopt(d){
    if(!d || !d.access_token) return false;
    this.session={access_token:d.access_token, refresh_token:d.refresh_token,
      expires_at:(Date.now()/1000|0)+(d.expires_in||3600), user:d.user};
    this.persistSession();
    console.log('[AUTH] session set — auth.uid():', d.user&&d.user.id, '| email:', d.user&&d.user.email);
    try{ if(window.__rtClient) window.__rtClient.realtime.setAuth(this.session.access_token); }catch(e){}
    return true;
  },
  async _call(path, body, useToken){
    const b=sbBase(); if(!b) throw new Error('סנכרון ענן לא מוגדר');
    const r=await fetch(b.url+'/auth/v1/'+path,{
      method:'POST',
      headers:Object.assign(
        {'apikey':b.key,'Content-Type':'application/json'},
        (useToken&&this.token())?{'Authorization':'Bearer '+this.token()}:{}),
      body:JSON.stringify(body||{})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.msg||d.error_description||d.message||('HTTP '+r.status));
    return d;
  },
  async signUp(email,password){
    const d=await this._call('signup',{email,password});
    if(this._adopt(d)) return {ok:true, confirmed:true};
    return {ok:true, confirmed:false};
  },
  async signIn(email,password){

  },
  async refresh(){
    if(!this.session||!this.session.refresh_token) return false;

  },

  },
  async recover(email){ await this._call('recover',{email}); },
  async resend(email){ await this._call('resend',{type:'signup',email}); },
  async signOut(){
    try{ if(this.token()) await this._call('logout',{},true); }catch(e){}
    this.session=null; this.persistSession();
  }
};
const CloudAPI={
  async req(method, path, body, extra){
    const b=sbBase(); if(!b) throw new Error('no supabase');
    const hadSession=!!Auth.session;
    await Auth.ensureFresh();
    if(hadSession && !Auth.session){
      const e=new Error('הסשן פג ורענון הטוקן נכשל — נדרשת התחברות מחדש');
      e.status=401;
      console.error('[Supabase auth] session refresh failed before', method, '/'+path);
      if(!window.__authExpiredAt || Date.now()-window.__authExpiredAt>60000){
        window.__authExpiredAt=Date.now();
        toast('פג תוקף ההתחברות — התחבר מחדש'); render();
      }
      throw e;
    }
    const tok=Auth.token();
    if(!tok){ const e=new Error('לא מחובר לחשבון'); e.status=401; throw e; }
    let r;
    try{
      r=await fetch(b.url+'/rest/v1/'+path,{
        method, headers:Object.assign({'apikey':b.key,'Authorization':'Bearer '+tok,'Content-Type':'application/json'},extra||{}),
        body:body!==undefined?JSON.stringify(body):undefined});
    }catch(e){
      console.error('[Supabase network]', method, '/'+path, e);
      throw e;
    }
    if(r.status===204) return null;
    const d=await r.json().catch(()=>null);
    if(!r.ok){
      console.error('[Supabase]', method, '/'+path, r.status, d||'');
      const e=new Error((d&&(d.message||d.hint))||('HTTP '+r.status));
      e.status=r.status;
      e.code=d&&d.code;
      e.detail=d;
      throw e;
    }

  },
  listTrips(){ return this.req('GET','trips?select=id,owner,rev,updated_at,payload'); },
  getTrip(id){ return this.req('GET','trips?id=eq.'+id+'&select=id,owner,rev,payload'); },
  insertTrip(payload){
    const uid=Auth.user().id;
    return this.req('POST','trips',[{owner:uid, payload, rev:1, updated_by:uid}],{'Prefer':'return=representation'});
  },
  updateTrip(id, prevRev, payload){
    /* נעילת-גרסה בצד השרת: מעדכן רק אם rev לא השתנה מאז שקראנו */
    return this.req('PATCH','trips?id=eq.'+id+'&rev=eq.'+prevRev,
      {payload, rev:prevRev+1, updated_by:Auth.user().id, updated_at:new Date().toISOString()},
      {'Prefer':'return=representation'});
  },
  getTripMeta(id){ return this.req('GET','trips?id=eq.'+id+'&select=id,rev,owner'); },
  deleteTrip(id){ return this.req('DELETE','trips?id=eq.'+id); },
  myRoles(){ return this.req('GET','trip_members?select=trip_id,role,user_id'); },
  members(tripId){ return this.req('GET','trip_members?trip_id=eq.'+tripId+'&select=user_id,role,email'); },
  invites(tripId){ return this.req('GET','trip_invites?trip_id=eq.'+tripId+'&select=email,role'); },
  myInvites(){ return this.req('GET','trip_invites?select=trip_id,email,role'); },
  invite(tripId,email,role){ return this.req('POST','trip_invites',[{trip_id:tripId,email:email.toLowerCase(),role}],{'Prefer':'resolution=merge-duplicates'}); },
  uninvite(tripId,email){ return this.req('DELETE','trip_invites?trip_id=eq.'+tripId+'&email=eq.'+encodeURIComponent(email.toLowerCase())); },
  acceptInvite(tripId,role){ return this.req('POST','trip_members',[{trip_id:tripId,user_id:Auth.user().id,role,email:Auth.email().toLowerCase()}],{'Prefer':'resolution=merge-duplicates'}); },
  removeMember(tripId,userId){ return this.req('DELETE','trip_members?trip_id=eq.'+tripId+'&user_id=eq.'+userId); },
  setRole(tripId,userId,role){ return this.req('PATCH','trip_members?trip_id=eq.'+tripId+'&user_id=eq.'+userId,{role}); },
  getBlob(key){ return this.req('GET','blobs?key=eq.'+encodeURIComponent(key)+'&select=value'); },
  putBlob(key,tripId,value){ return this.req('POST','blobs?on_conflict=key',[{key,trip_id:tripId||null,value}],{'Prefer':'resolution=merge-duplicates,return=minimal'}); },
  getState(){ return this.req('GET','user_state?select=payload'); },
  putState(payload){ return this.req('POST','user_state?on_conflict=user_id',[{user_id:Auth.user().id,payload}],{'Prefer':'resolution=merge-duplicates,return=minimal'}); },
  activeCode(tripId){ return this.req('GET','trip_codes?trip_id=eq.'+tripId+'&revoked=eq.false&select=code,role,expires_at&order=expires_at.desc&limit=1'); },
  createCode(tripId,code,role,expiresISO){ return this.req('POST','trip_codes',[{code,trip_id:tripId,role,expires_at:expiresISO}],{'Prefer':'return=minimal'}); },
  revokeCodes(tripId){ return this.req('PATCH','trip_codes?trip_id=eq.'+tripId+'&revoked=eq.false',{revoked:true}); },
  redeemCode(code){ return this.req('POST','rpc/redeem_trip_code',{p_code:code}); }
};
function cloudPayload(t){ return {v:3, trip:stripCloud(t), docs:docsForTrip(t.id)}; }
function stripCloud(t){ const c=JSON.parse(JSON.stringify(t)); delete c.cloud; delete c.share; return c; }
function cloudFingerprint(t){ return hsh(JSON.stringify(stripCloud(t))+JSON.stringify(docsForTrip(t.id))); }
const CloudSync={
  pollMs:3000, timer:null, busy:false, pushT:null, lastHash:{}, status:{}, realtimeOn:false, started:false, lastMigrateError:null,
  active(){ return !!(sbBase() && Auth.session); },
  cloudTrips(){ return S.trips.filter(t=>t.cloud && t.cloud.id); },
  label(id){
    const st=this.status[id];
    if(!st) return '☁ ענן';
    if(st.state==='syncing') return '⟳ מסנכרן…';
    if(st.state==='offline') return '⌁ לא מקוון';
    if(st.state==='error') return '⚠ שגיאה';
    return this.realtimeOn?'<i class="live-ind"></i>חי':'✓ מסונכרן';
  },
  setStatus(id,state){
    this.status[id]={state,at:Date.now()};
    document.querySelectorAll('[data-shp="'+id+'"]').forEach(el=>el.innerHTML=this.label(id));
  },
  isOffline(e){ return (typeof navigator!=='undefined'&&navigator.onLine===false)||!!(e&&(e.name==='TypeError'||/fetch|network/i.test(String(e.message||'')))); },
  start(){

  },
  stop(){ clearInterval(this.timer); this.timer=null; this.started=false; },
  schedulePush(){ if(!this.active()) return; clearTimeout(this.pushT); this.pushT=setTimeout(()=>this.pushDirty(),900); },
  initRealtime(){
    /* progressive enhancement: supabase-js לערוץ postgres_changes; בלי — פולינג מהיר */
    const b=sbBase(); if(!b||this.realtimeOn) return;
    const srcs=['https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.49.1/supabase.min.js',
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'];
    const tryLoad=i=>{
      if(i>=srcs.length) return;
      const s=document.createElement('script');
      s.src=srcs[i]; s.crossOrigin='anonymous';
      s.onload=()=>{
        try{
          const client=window.supabase.createClient(b.url,b.key,{auth:{persistSession:false,autoRefreshToken:false}});
          if(Auth.token()) client.realtime.setAuth(Auth.token());

            .on('postgres_changes',{event:'*',schema:'public',table:'trips'},evt=>this.onTripEvent(evt))
            .on('postgres_changes',{event:'*',schema:'public',table:'trip_members'},()=>this.tick())
            .subscribe(st=>{

            });

        }catch(e){}

    };

  },
  restartTimer(){ if(this.timer){ clearInterval(this.timer); this.timer=setInterval(()=>this.tick(),this.pollMs); } },
  onTripEvent(evt){

    }catch(e){ console.error('[TRIP-SYNC ⚡] אירוע חי נכשל', e); }

  },
  applyRemoteRow(row){

  },
  async tick(){
    if(this.busy||!this.active()) return;

      await this.pullAll();

    }catch(e){}finally{ this.busy=false; }
  },
  async acceptInvites(){

      for(const i of (inv||[])){

        try{ await CloudAPI.acceptInvite(i.trip_id, i.role); await CloudAPI.uninvite(i.trip_id, i.email); toast('צורפת לטיול משותף ✓'); }catch(e){}
      }
    }catch(e){}
  },
  async pullAll(){
    let rows;
    try{ rows=await CloudAPI.listTrips(); }
    catch(e){ this.cloudTrips().forEach(t=>this.setStatus(t.cloud.id,this.isOffline(e)?'offline':'error')); return; }
    let roles=null;
    try{
      roles={};
      (await CloudAPI.myRoles()||[]).forEach(m=>{ if(m.user_id===Auth.user().id) roles[m.trip_id]=m.role; });
      this._roles=roles;
    }catch(e){
      roles=null;
      console.warn('[ROLE] קריאת תפקידים נכשלה — משמר תפקידים קיימים:', e&&e.message);
    }
    const seen=new Set();
    let changed=false;
    for(const row of (rows||[])){
      seen.add(row.id);
      const prevLocal=S.trips.find(t=>t.cloud&&t.cloud.id===row.id);
      const role=row.owner===Auth.user().id?'owner'
        :(roles ? (roles[row.id]||'view') : ((prevLocal&&prevLocal.cloud&&prevLocal.cloud.role)||'view'));
      const local=prevLocal;
      if(!local){
        const p=row.payload||{};
        const t=p.trip; if(!t) continue;
        t.cloud={id:row.id, rev:row.rev, role, owner:row.owner, pushedKeys:[]};
        S.trips.unshift(t);
        S.docs=S.docs.filter(d=>d.tripId!==t.id).concat(p.docs||[]);
        this.lastHash[row.id]=cloudFingerprint(t);
        this.setStatus(row.id,'synced');
        changed=true; continue;
      }
      if(local.cloud.role!==role && role!=='owner'){
        if(this._viewWarn) delete this._viewWarn[row.id];
        console.log('[ROLE] ההרשאה שלך עודכנה:', local.cloud.role, '→', role, '| trip', row.id);
        toast(role==='edit'
          ? 'קיבלת הרשאת עריכה לטיול "'+(local.name||'')+'" ✓ השינויים שלך יסונכרנו'
          : 'ההרשאה לטיול "'+(local.name||'')+'" שונתה לצפייה בלבד');
      }
      local.cloud.role=role; local.cloud.owner=row.owner;
      if(row.rev > (local.cloud.rev||0)){
        const p=row.payload||{}; if(!p.trip) continue;
        const dirty=this.lastHash[row.id]!==undefined && cloudFingerprint(local)!==this.lastHash[row.id] && role!=='view';
        if(dirty){
          const merged=mergeTrips(stripCloud(local), p.trip);
          merged.cloud={id:row.id, rev:row.rev, role, owner:row.owner, pushedKeys:local.cloud.pushedKeys||[]};
          const i=S.trips.findIndex(x=>x.id===merged.id); if(i>=0) S.trips[i]=merged; else S.trips.unshift(merged);
          const localNewer=(stripCloud(local).updatedAt||0)>=((p.trip.updatedAt)||0);
          const ld=docsForTrip(merged.id);
          S.docs=S.docs.filter(d=>d.tripId!==merged.id).concat(mergeDocs(ld,p.docs||[],localNewer));
          /* lastHash לא מעודכן → המיזוג יידחף כגרסה הבאה */
          this.setStatus(row.id,'syncing'); this.schedulePush();
        }else{
          const t=p.trip;
          t.cloud={id:row.id, rev:row.rev, role, owner:row.owner, pushedKeys:local.cloud.pushedKeys||[]};
          const i=S.trips.findIndex(x=>x.id===t.id); if(i>=0) S.trips[i]=t; else S.trips.unshift(t);
          S.docs=S.docs.filter(d=>d.tripId!==t.id).concat(p.docs||[]);
          this.lastHash[row.id]=cloudFingerprint(t);
          this.setStatus(row.id,'synced');
        }
        changed=true;
      }
    }
    /* טיול-ענן שנמחק מרחוק/שההרשאה הוסרה */
    const gone=this.cloudTrips().filter(t=>!seen.has(t.cloud.id));
    if(gone.length){ gone.forEach(t=>{ S.trips=S.trips.filter(x=>x!==t); }); changed=true; }
    if(changed){ if(typeof ensureShapes==='function') ensureShapes(); save(); render(); }
  },
  async pushDirty(){
    if(Auth.session && S.trips.some(t=>!t.cloud && !t.share)) await this.migrateLocal();
    for(const t of this.cloudTrips()){
      const fp=cloudFingerprint(t);
      if(this.lastHash[t.cloud.id]===fp) continue;
      if(t.cloud.role==='view'){
        this._viewWarn=this._viewWarn||{};
        if(!this._viewWarn[t.cloud.id]){
          this._viewWarn[t.cloud.id]=1;
          toast('לטיול "'+(t.name||'')+'" יש לך הרשאת צפייה בלבד — עריכות לא נשמרות בענן');
        }
        continue;
      }
      await this.push(t,fp);
    }
    await this.pushState();
  },
  async push(t, fp, retried){
    const id=t.cloud.id;
    this.setStatus(id,'syncing');
    const prev=t.cloud.rev||0;
    try{
      await this.pushBlobs(t);
      const body=cloudPayload(t);
      console.log('[TRIP-SYNC →] PATCH trips?id=eq.'+id+'&rev=eq.'+prev,
        {nextRev:prev+1, by:Auth.user()&&Auth.user().id, bytes:JSON.stringify(body).length});
      const rows=await CloudAPI.updateTrip(id, prev, body);
      const row=rows&&rows[0];
      if(row && row.id){
        t.cloud.rev=row.rev;
        this.lastHash[id]=fp!=null?fp:cloudFingerprint(t);
        this.setStatus(id,'synced');
        console.log('[TRIP-SYNC ✓] rev',prev,'→',row.rev,'| updated_by:',row.updated_by||'');
        return;
      }
      /* אפס שורות עודכנו: או שה-rev התקדם (קונפליקט) או שה-RLS סינן */
      const meta=await CloudAPI.getTripMeta(id).catch(()=>null);
      const srvRev=meta&&meta[0]&&meta[0].rev;
      if(srvRev!=null && srvRev>prev){
        console.warn('[TRIP-SYNC ⇄] קונפליקט: rev בשרת',srvRev,'> מקומי',prev,'— מושך, ממזג ושולח שוב');
        await this.pullAll(); /* מסלול המיזוג; lastHash לא עודכן ולכן הטיול נשאר "דורש דחיפה" */
        if(!retried){
          const t2=S.trips.find(x=>x.cloud && x.cloud.id===id);
          if(t2 && cloudFingerprint(t2)!==this.lastHash[id]) await this.push(t2, cloudFingerprint(t2), true);
        }
        return;
      }
      const e=new Error(srvRev==null
        ? 'אין גישה לשורת הטיול (ייתכן שהוסרת מהטיול)'
        : 'העדכון נדחה על ידי מדיניות ההרשאות (RLS) — נדרש תפקיד עריכה');
      e.status=403;
      throw e;
    }catch(e){
      console.error('[TRIP-SYNC ✗] העדכון לא נשמר', {tripId:id, triedRev:prev+1, role:t.cloud.role,
        authUid:Auth.user()&&Auth.user().id, message:e.message, code:e.code||null, status:e.status||null, detail:e.detail||null});
      this.setStatus(id, this.isOffline(e)?'offline':'error');
      if(e.status===401||e.status===403) toast('עריכת הטיול לא נשמרה בענן: '+sbErrorHe(e));
    }
  },
  async pushBlobs(t){
    t.cloud.pushedKeys=t.cloud.pushedKeys||[];
    const keys=collectBlobKeys(t).concat(docsForTrip(t.id).map(d=>d.key));
    for(const k of keys){
      if(t.cloud.pushedKeys.includes(k)) continue;
      const v=await FileStore.get(k);
      if(!v) continue;
      await CloudAPI.putBlob(k, t.cloud.id, v);
      t.cloud.pushedKeys.push(k);
    }
  },
  async fetchBlob(key){
    try{
      const have=await FileStore.get(key); if(have) return have;
      const rows=await CloudAPI.getBlob(key);
      if(rows&&rows.length&&typeof rows[0].value==='string'){ await FileStore.put(key,rows[0].value); return rows[0].value; }
    }catch(e){}
    return null;
  },
  _stateHash:null,
  async pushState(){
    try{
      const cleanSettings=Object.assign({},S.settings); delete cleanSettings.sb;
      const payload={settings:cleanSettings, activeTripId:S.activeTripId, docs:S.docs.filter(d=>!d.tripId)};
      const h=hsh(JSON.stringify(payload));
      if(h===this._stateHash) return;
      await CloudAPI.putState(payload);
      this._stateHash=h;
    }catch(e){}
  },
  async pullState(){
    try{
      const rows=await CloudAPI.getState();
      if(rows&&rows.length&&rows[0].payload){
        const p=rows[0].payload;
        if(p.settings){ delete p.settings.sb; S.settings=Object.assign(S.settings,p.settings); }
        if(p.activeTripId) S.activeTripId=p.activeTripId;
        if(Array.isArray(p.docs)) S.docs=S.docs.filter(d=>d.tripId).concat(p.docs);
        this._stateHash=hsh(JSON.stringify({settings:S.settings,activeTripId:S.activeTripId,docs:S.docs.filter(d=>!d.tripId)}));
      }
    }catch(e){}
  },
  async adoptTrip(t){
    if(t && t.cloud) return t.cloud.id;
    const b=sbBase();
    const uid=Auth.user()&&Auth.user().id;
    console.log('[TRIP-CREATE 2/6] בדיקת ענן', {
      sbConfigured: !!b,
      baseUrl: b? b.url : '(אין)',
      keyPrefix: b? b.key.slice(0,18)+'…' : '(אין)',
      hasSession: !!Auth.session,
      authUid: uid||null,
      email: Auth.email()||null
    });
    if(!this.active() || !t){
      const reason=!b?'Supabase לא מוגדר (sbBase=null)':(!Auth.session?'אין סשן מחובר (Auth.session=null)':'טיול חסר');
      console.warn('[TRIP-CREATE ✗] לא נשלח INSERT — הסיבה:', reason);
      if(!Auth.session) toast('הטיול נשמר במכשיר בלבד — התחבר כדי לשמור בענן');
      return null;
    }
    delete t.share;
    const rowToSend={owner:uid, rev:1, updated_by:uid, payload:cloudPayload(t)};
    console.log('[TRIP-CREATE 3/6] payload → Supabase (POST /rest/v1/trips):', rowToSend);
    let rows;
    try{
      rows=await CloudAPI.insertTrip(rowToSend.payload);
    }catch(e){
      this.lastMigrateError=e;
      const full={
        message:e.message, code:e.code||null,
        details:(e.detail&&e.detail.details)||null,
        hint:(e.detail&&e.detail.hint)||null,
        status:e.status||null,
        rawBody:e.detail||null,
        payloadSent:rowToSend, authUid:uid
      };
      console.error('[TRIP-CREATE ✗] INSERT נכשל — אובייקט השגיאה המלא:', full);
      throw e;
    }
    console.log('[TRIP-CREATE 4/6] תשובה ← Supabase:', rows);
    const row=rows && rows[0];
    if(!row || !row.id){
      const e=new Error('Supabase לא החזיר מזהה שורה');
      console.error('[TRIP-CREATE ✗] אין id בתשובה:', rows);
      toast('שמירת הטיול בענן נכשלה: לא התקבל מזהה');
      throw e;
    }
    t.cloud={id:row.id, rev:row.rev||1, role:'owner', owner:row.owner||uid, pushedKeys:[]};
    this.lastHash[row.id]=cloudFingerprint(t);
    this.setStatus(row.id,'synced');
    console.log('[TRIP-CREATE 5/6] נשמר באפליקציה — db id:', row.id, '| owner בשורה:', row.owner);
    try{
      const chk=await CloudAPI.getTrip(row.id);
      if(chk && chk.length) console.log('[TRIP-CREATE 6/6] אימות-קריאה תחת RLS ✓ השורה קיימת ונקראת');
      else{
        console.error('[TRIP-CREATE ✗] נכתב אך לא נקרא חזרה — policy בשם trips_select חסר?');
        toast('הטיול נכתב לענן אך אינו נקרא חזרה — בדוק trips_select');
      }
    }catch(e){ console.error('[TRIP-CREATE ✗] אימות-קריאה נכשל:', e); }
    return row.id;
  },
  async migrateLocal(){
    const locals=S.trips.filter(t=>!(t.cloud&&t.cloud.id));
    if(!locals.length) return 0;
    if(locals.length>1) toast('מעביר '+locals.length+' טיולים לענן…');
    let n=0;
    for(const t of locals){
      try{
        await this.adoptTrip(t);
        await this.pushBlobs(t);
        n++;
      }catch(e){ this.lastMigrateError=e; }
    }
    await this.pushState();
    save(); render();
    if(n>1) toast(n+' טיולים בענן ✓');
    return n;
  }
};
async function cloudBoot(){
  if(S.settings && S.settings.sb && SYNC_CONFIG.SUPABASE_URL){
    console.warn('[CONFIG] מתעלם מהגדרת Supabase ישנה שנשמרה במכשיר:', S.settings.sb.url||'(ריק)', '→ משתמש בכתובת המוטמעת:', SYNC_CONFIG.SUPABASE_URL);
    delete S.settings.sb;
  }
  if(!sbBase()) return false;
  Auth.loadCached();
  if(!(await Auth.ensureFresh())) return false;
  try{
    await CloudSync.pullState();
    await CloudSync.pullAll();
    await CloudSync.migrateLocal();
    CloudSync.start();
    render();
    return true;
  }catch(e){
    console.error('[cloudBoot]',e);
    if(sbIsSchemaError(e) && !window.__schemaWarned){
      window.__schemaWarned=true;
      toast('התקנת הענן לא הושלמה — פתח "אבחון ענן" בחשבון');
    }
    return false;
  }
}
const CLOUD_SQL=`-- ================================================

create extension if not exists pgcrypto;

create table if not exists trips (
  id uuid primary key default gen_random_uuid(),
  owner uuid not null default auth.uid() references auth.users(id) on delete cascade,
  rev bigint not null default 1,
  payload jsonb not null,
  updated_by uuid,
  updated_at timestamptz not null default now()
);
create table if not exists trip_members (
  trip_id uuid not null references trips(id) on delete cascade,
  user_id uuid not null references auth.users(id) on delete cascade,
  email text,
  role text not null default 'edit' check (role in ('edit','view')),
  primary key (trip_id, user_id)
);
create table if not exists trip_invites (
  trip_id uuid not null references trips(id) on delete cascade,
  email text not null,
  role text not null default 'edit' check (role in ('edit','view')),

  primary key (trip_id, email)
);

  key text primary key,
  owner uuid not null default auth.uid() references auth.users(id) on delete cascade,

  updated_at timestamptz default now()
);
create table if not exists user_state (
  user_id uuid primary key references auth.users(id) on delete cascade,
  payload jsonb not null,
  updated_at timestamptz default now()
);
create table if not exists trip_codes (
  code text primary key,
  trip_id uuid not null references trips(id) on delete cascade,
  role text not null default 'edit' check (role in ('edit','view')),

);

create or replace function redeem_trip_code(p_code text)
returns jsonb language plpgsql security definer set search_path = public as $$
declare c record;
begin
  select * into c from trip_codes where code = upper(p_code);
  if not found then return jsonb_build_object('status','invalid'); end if;
  if c.revoked then return jsonb_build_object('status','revoked'); end if;
  if c.expires_at <= now() then return jsonb_build_object('status','expired'); end if;
  if exists (select 1 from trips t where t.id = c.trip_id and t.owner = auth.uid()) then
    return jsonb_build_object('status','owner','trip_id',c.trip_id);
  end if;
  if exists (select 1 from trip_members m where m.trip_id = c.trip_id and m.user_id = auth.uid()) then
    return jsonb_build_object('status','already','trip_id',c.trip_id,'role',c.role);
  end if;
  insert into trip_members(trip_id, user_id, email, role)
  values (c.trip_id, auth.uid(), lower(auth.email()), c.role);
  return jsonb_build_object('status','ok','trip_id',c.trip_id,'role',c.role);
end $$;
revoke execute on function redeem_trip_code(text) from anon, public;
grant execute on function redeem_trip_code(text) to authenticated;

function sbErrorHe(e){
  const msg=String(e&&e.message||'');
  if(e&&(e.name==='TypeError'||/failed to fetch|networkerror/i.test(msg))) return 'אין חיבור לרשת';
  if((e&&(e.code==='42703'||e.code==='PGRST204'))||/could not find the '.*' column|column .* does not exist/i.test(msg))
    return 'עמודה חסרה בטבלה — הסכמה בענן לא תואמת לאפליקציה (אבחון ענן יציג תיקון מדויק)';
  if((e&&(e.code==='42P01'||e.code==='PGRST205'))||/relation .* does not exist|could not find the table/i.test(msg))
    return 'טבלה חסרה בענן — נדרשת הרצת סקריפט ההתקנה (פעם אחת)';
  if((e&&e.code==='PGRST202')||/could not find the function/i.test(msg))
    return 'פונקציית ההצטרפות חסרה בענן — נדרשת הרצת סקריפט ההתקנה';
  if((e&&e.status===401)||/jwt|token/i.test(msg)) return 'פג תוקף ההתחברות — התנתק והתחבר מחדש';
  if((e&&e.code==='42P17')||/infinite recursion detected in policy/i.test(msg))
    return 'לולאת policies הדדית (42P17) — הרץ את סקריפט התיקון עם פונקציות העזר';
  const gm=/permission denied for (?:table|relation) "?([a-zA-Z_]+)"?/i.exec(msg);
  if(gm) return 'חסרה הרשאת בסיס (GRANT) לטבלת '+gm[1]+' — הרץ את בלוק ה-GRANT המלא';
  if((e&&e.status===403)||(e&&e.code==='42501')||/permission|policy|row-level/i.test(msg)) return 'אין הרשאה (RLS) לפעולה הזו';
  return 'שגיאת ענן: '+msg;
}
function sbIsSchemaError(e){ const he=sbErrorHe(e); return he.includes('סקריפט ההתקנה')||he.includes('עמודה חסרה'); }
async function cloudDoctor(){
  const out=[];
  const probe=async(label, fn)=>{
    try{ await fn(); out.push({label, st:'ok'}); }
    catch(e){
      console.error('[doctor]', label, e);
      const he=sbErrorHe(e);
      out.push({label,
        st:(he.includes('סקריפט')||he.includes('עמודה חסרה'))?'missing':((he.includes('הרשאה')||he.includes('GRANT')||he.includes('42P17'))?'perm':(he.includes('רשת')?'net':(he.includes('התחבר')?'auth':'err'))),
        he, raw:String(e&&e.message||'')});
    }
  };
  out.push({label:'התחברות לחשבון', st:Auth.session?'ok':'auth'});
  if(Auth.session){
    const SCHEMA={
      trips:['id','owner','rev','payload','updated_by','updated_at'],
      trip_members:['trip_id','user_id','role','email'],
      trip_invites:['trip_id','email','role'],
      blobs:['key','trip_id','value'],
      user_state:['user_id','payload'],
      trip_codes:['code','trip_id','role','expires_at','revoked']};
    for(const tbl of Object.keys(SCHEMA)){
      let tableOk=true;
      await probe('טבלת '+tbl, async()=>{
        try{ await CloudAPI.req('GET',tbl+'?select='+SCHEMA[tbl][0]+'&limit=0'); }
        catch(e){ tableOk=false; throw e; }
      });
      if(!tableOk) continue;
      for(const col of SCHEMA[tbl].slice(1))
        await probe('עמודת '+tbl+'.'+col, ()=>CloudAPI.req('GET',tbl+'?select='+col+'&limit=0'));
    }
    await probe('כתיבה לטבלת trips (insert)', async()=>{
      const rows=await CloudAPI.req('POST','trips',[{owner:Auth.user().id, rev:1, payload:{v:0, probe:true}, updated_by:Auth.user().id}],{'Prefer':'return=representation'});
      const id=rows&&rows[0]&&rows[0].id;
      if(!id) throw new Error('insert לא החזיר מזהה');
      try{ await CloudAPI.req('DELETE','trips?id=eq.'+id); }catch(e){}
    });
    await probe('פונקציית redeem_trip_code', async()=>{
      const r=await CloudAPI.req('POST','rpc/redeem_trip_code',{p_code:'________'});
      if(!(r&&r.status)) throw new Error('תשובה לא צפויה');
    });
  }
  return out;
}
async function openCloudDoctor(){
  openSheet('אבחון ענן', `<div id="docBody">${'<div class="sk sk-row"></div>'.repeat(5)}</div>`);

  const pill=r=>r.st==='ok'?'<span class="status-pill st-done">תקין</span>'

  const tableMissing=res.some(r=>r.st==='missing' && r.label.startsWith('טבלת'));
  const colMissing=res.filter(r=>r.st==='missing' && r.label.startsWith('עמודת')).map(r=>r.label.replace('עמודת ',''));
  window.__fixSQL=colMissing.length?schemaFixSQL(colMissing):'';
  const missing=tableMissing;
  const perm=res.some(r=>r.st==='perm');
  el.innerHTML=`
    <div class="card" style="padding:2px 14px;margin-bottom:14px">
      ${res.map(r=>`<div class="list-row" style="cursor:default">

        ${pill(r)}
      </div>`).join('')}
    </div>
    ${colMissing.length?`
      <div class="card pad" style="background:var(--amber-soft);border-color:transparent;margin-bottom:12px">

        <p style="margin:5px 0 0;font-size:12.5px;color:var(--ink2)">חסרות ${colMissing.length} עמודות: <b style="direction:ltr;display:inline-block">${esc(colMissing.join(', '))}</b>. התיקון המדויק (רק מוסיף עמודות — לא נוגע בנתונים):</p>

        <textarea class="inp" readonly style="direction:ltr;font-family:ui-monospace,monospace;font-size:11px;min-height:120px">${esc(window.__fixSQL)}</textarea></div>
      <button class="btn btn-primary btn-block" style="margin-bottom:12px" onclick="copyFixSQL()">${ic('copy',16)} העתקת תיקון הסכמה</button>`:''}
    ${missing?`
      <div class="card pad" style="background:var(--amber-soft);border-color:transparent;margin-bottom:12px">
        <b style="font-size:13.5px;color:var(--amber)">${ic('alert',15)} חסרה התקנה חד-פעמית בענן</b>
        <p style="margin:5px 0 0;font-size:12.5px;color:var(--ink2)">העתק את הסקריפט, הדבק ב-Supabase ← SQL Editor ← Run (בטוח להריץ שוב), ואז חזור לכאן ל"בדיקה מחדש".</p>
      </div>
      <div class="field"><label>סקריפט התקנה מלא</label>
        <textarea class="inp" readonly style="direction:ltr;font-family:ui-monospace,monospace;font-size:11px;min-height:170px">${esc(CLOUD_SQL)}</textarea></div>
      <button class="btn btn-primary btn-block" onclick="copyCloudSQL()">${ic('copy',16)} העתקת הסקריפט</button>`
    :perm?`<p class="mini-note">יש טבלאות אך חסרות הרשאות — הרץ שוב את סקריפט ההתקנה המלא (הוא מתקן גם policies).</p>
      <button class="btn btn-primary btn-block" onclick="copyCloudSQL()">${ic('copy',16)} העתקת הסקריפט</button>`
    :`<div class="card pad" style="background:var(--green-soft);border-color:transparent"><b style="color:var(--green);font-size:13.5px">${ic('check',15)} הכל תקין — שיתוף בקוד מוכן לעבודה</b></div>`}
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="openCloudDoctor()">${ic('refresh',16)} בדיקה מחדש</button>`;
}
function copyCloudSQL(){
  const done=()=>toast('הסקריפט הועתק ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(CLOUD_SQL).then(done).catch(()=>prompt('העתק:',CLOUD_SQL));
  else prompt('העתק:',CLOUD_SQL);
}
const COL_DEFS={
  'trips.owner':"uuid default auth.uid() references auth.users(id) on delete cascade",
  'trips.rev':"bigint not null default 1",
  'trips.payload':"jsonb",
  'trips.updated_by':"uuid",
  'trips.updated_at':"timestamptz not null default now()",
  'trip_members.user_id':"uuid references auth.users(id) on delete cascade",
  'trip_members.role':"text not null default 'edit'",
  'trip_members.email':"text",
  'trip_invites.email':"text",
  'trip_invites.role':"text not null default 'edit'",
  'blobs.trip_id':"uuid references trips(id) on delete cascade",
  'blobs.value':"text",
  'user_state.payload':"jsonb",
  'trip_codes.trip_id':"uuid references trips(id) on delete cascade",
  'trip_codes.role':"text not null default 'edit'",
  'trip_codes.expires_at':"timestamptz not null default now() + interval '14 days'",
  'trip_codes.revoked':"boolean not null default false"
};
function schemaFixSQL(missingCols){
  const lines=missingCols.map(k=>{
    const [tbl,col]=k.split('.');
    return 'alter table if exists '+tbl+' add column if not exists '+col+' '+(COL_DEFS[k]||'text')+';';
  });
  lines.push('','-- לאחר ההוספה, הרץ שוב את סקריפט ההתקנה המלא כדי לוודא policies תקינים.','-- (אם הטבלה ריקה, חלופה נקייה: drop table <שם> cascade; ואז סקריפט ההתקנה המלא.)');
  return lines.join('\n');
}
function copyFixSQL(){
  const sql=window.__fixSQL||'';
  const done=()=>toast('SQL התיקון הועתק ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(sql).then(done).catch(()=>prompt('העתק:',sql));
  else prompt('העתק:',sql);
}
Object.assign(window,{openCloudDoctor, copyCloudSQL, copyFixSQL, schemaFixSQL});

<script>
/* ---- pull to refresh (iOS-style arc, rAF-smooth) ---- */
const PTR_TRIGGER=48;   /* סף שחרור (מרחק מרוסן) */
const PTR_SLACK=14;     /* חופש תנועה לפני שהמחווה בכלל נחשבת */
function ptrDamp(dy){ return Math.min(90, Math.round(dy*0.45)); }
function ptrProgress(d){ return Math.max(0, Math.min(1, d/PTR_TRIGGER)); }
(function(){
  const C=56.6; /* 2πr, r=9 */
  const ptr=document.createElement('div');
  ptr.id='ptr';
  ptr.innerHTML='<svg viewBox="0 0 24 24"><circle class="ptr-arc" cx="12" cy="12" r="9"/></svg>';
  document.body.appendChild(ptr);
  const arc=ptr.querySelector('.ptr-arc');
  const svg=ptr.querySelector('svg');
  let startY=null, startX=null, pulling=false, dist=0, refreshing=false, armed=false, raf=0;
  const scr=()=>document.getElementById('screen');
  function paint(){
    raf=0;
    const p=ptrProgress(dist);
    ptr.style.transform='translate(-50%,'+Math.round(dist*0.9-58)+'px) scale('+(0.6+0.4*Math.min(1,p*1.15)).toFixed(3)+')';
    ptr.style.opacity=String(Math.max(0, Math.min(1, (p-0.18)*1.5)).toFixed(2));
    arc.style.strokeDashoffset=(C*(1-0.82*p)).toFixed(1);
    svg.style.transform='rotate('+Math.round(dist*2.4)+'deg)';
    const s=scr();
    if(s) s.style.transform=dist?('translateY('+Math.min(54, Math.round(dist*0.55))+'px)'):'';
  }
  function setPull(d){
    dist=d;
    const nowArmed=d>=PTR_TRIGGER;
    if(nowArmed && !armed){ armed=true; haptic(); }
    if(!nowArmed) armed=false;
    if(!raf) raf=requestAnimationFrame(paint);
  }
  function settle(){
    if(raf){ cancelAnimationFrame(raf); raf=0; }
    const s=scr();
    if(s){
      s.style.transition='transform .3s cubic-bezier(.2,.8,.3,1)';
      s.style.transform='';
      setTimeout(()=>{ const n=scr(); if(n) n.style.transition=''; }, 340);
    }
    ptr.classList.remove('spin');
    ptr.style.transition='transform .34s cubic-bezier(.22,.9,.3,1.14), opacity .22s';
    ptr.style.transform='translate(-50%,-64px) scale(.6)';
    ptr.style.opacity='0';
    setTimeout(()=>{
      ptr.style.transition='';
      arc.style.strokeDashoffset=String(C);
      svg.style.transform='';
    }, 360);
    startY=null; pulling=false; dist=0; armed=false;
  }
  async function doRefresh(){
    refreshing=true;
    ptr.style.transition='transform .2s cubic-bezier(.2,.8,.3,1)';
    ptr.style.transform='translate(-50%,12px) scale(1)';
    ptr.style.opacity='1';
    ptr.classList.add('spin');
    const s=scr();
    if(s){ s.style.transition='transform .2s'; s.style.transform='translateY(46px)'; }
    const minSpin=new Promise(r=>setTimeout(r,700));
    try{
      if(typeof CloudSync!=='undefined' && CloudSync.active()){
        await Promise.all([CloudSync.tick(), CloudSync.pullState().catch(()=>{}), minSpin]);
      }else{
        await minSpin;
      }
    }catch(e){}
    /* completion tick: close the circle for a beat, then spring away */
    ptr.classList.remove('spin');
    arc.style.transition='stroke-dashoffset .16s';
    arc.style.strokeDashoffset='0';
    await new Promise(r=>setTimeout(r,170));
    arc.style.transition='';
    refreshing=false;
    settle();
    haptic();
  }
  document.addEventListener('touchstart',e=>{
    if(refreshing) return;
    if(window.scrollY>0) return;
    if(e.touches.length!==1) return;
    const sh=document.getElementById('sheet');
    if(sh && sh.classList.contains('show')) return;
    const qm=document.getElementById('qmenu');
    if(qm && qm.classList.contains('show')) return;
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    pulling=false;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(startY==null || refreshing) return;
    const t0=e.touches[0];
    const dy=t0.clientY-startY, dx=t0.clientX-startX;
    if(!pulling){
      /* נעילת כיוון: מחווה אופקית (צ'יפים/ימים) לעולם לא הופכת לרענון */
      if(Math.abs(dx) > Math.abs(dy)+4){ startY=null; return; }
      /* רק אם המגע התחיל בחלק העליון של המסך */
      if(startY > Math.min(240, (window.innerHeight||800)*0.35)){ startY=null; return; }
      /* חופש תנועה: גלילה רגילה לא נחטפת */
      if(dy<=PTR_SLACK) return;
      if(window.scrollY>0){ startY=null; return; }
      pulling=true;
    }else{
      if(dy<=PTR_SLACK){ setPull(0); pulling=false; return; }
      if(window.scrollY>0){ setPull(0); pulling=false; startY=null; return; }
    }
    e.preventDefault();
    setPull(ptrDamp(dy-PTR_SLACK));
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(startY==null) return;
    if(pulling && dist>=PTR_TRIGGER) doRefresh();
    else settle();
  },{passive:true});
})();
Object.assign(window,{refreshDay});
</script>

function vNorm(s){
  return String(s||'').toLowerCase().trim()
    .replace(/[\u0591-\u05C7]/g,'')
    .replace(/[\u2019'"\u05F3\u05F4\-\u2013\u2014._]/g,'')
    .replace(/\s+/g,' ');
}
function vLev1(a,b){
  if(a===b) return true;
  const la=a.length, lb=b.length;
  if(Math.abs(la-lb)>1) return false;
  let i=0,j=0,ed=0;
  while(i<la&&j<lb){
    if(a[i]===b[j]){i++;j++;continue;}
    if(++ed>1) return false;
    if(la>lb) i++; else if(lb>la) j++; else {i++;j++;}
  }
  return ed+(la-i)+(lb-j)<=1;
}
function countryFlag(name){
  const q=vNorm(name); if(!q) return '';
  for(const k in COUNTRY_DB){
    const c=COUNTRY_DB[k];
    if(vNorm(c[0])===q||vNorm(c[1])===q) return c[2];
  }
  return '';
}
function citySearch(q, recents){
  const nq=vNorm(q);
  if(nq.length<2) return [];
  recents=(recents||[]).map(vNorm);
  const scored=[];
  for(const c of CITY_DB){
    const names=[c[0],c[1],c[2]].filter(Boolean);
    let best=0;
    for(const nm of names){
      const nn=vNorm(nm);
      if(nn===nq){best=Math.max(best,100);break;}
      if(nn.startsWith(nq)) best=Math.max(best,80);
      else if(nn.includes(nq)) best=Math.max(best,60);
      else if(nq.length>=4 && vLev1(nn,nq)) best=Math.max(best,45);
    }
    if(best){
      if(recents.includes(vNorm(c[0]))||recents.includes(vNorm(c[1]))) best+=30;
      scored.push({s:best, he:c[0], en:c[1], country:c[3],
        countryHe:(COUNTRY_DB[c[3]]||[])[0]||'', flag:(COUNTRY_DB[c[3]]||[])[2]||''});
    }
  }
  return scored.sort((a,b)=>b.s-a.s).slice(0,6);
}

  const box=document.getElementById('df-sugg');

function planDropTo(dayId){
  const id=window.__planSel; if(!id) return;
  const t=activeTrip(); if(!t) return;
  let ev=null;
  (t.destinations||[]).forEach(d=>(d.days||[]).forEach(dy=>{
    const i=(dy.events||[]).findIndex(x=>x.id===id);
    if(i>=0) ev=dy.events.splice(i,1)[0];
  }));
  if(!ev){ window.__planSel=null; refreshPlanning(); return; }

  refreshDay();
}

function todayInfo(t){
  if(!t) return {status:'none'};
  const td=todayStr();
  const d=tripDates(t);
  if(d.start && td<d.start) return {status:'before', days:diffDays(td,d.start)};
  if(d.end && td>d.end) return {status:'after'};
  for(const ds of (t.destinations||[]))
    for(const dy of (ds.days||[]))
      if(dy.date===td) return {status:'ongoing', dest:ds, day:dy};
  return {status:'gap'};
}
function destStripHTML(t,dest){
  if(!dest) return '';
  const flag=countryFlag(t.country);
  const evN=(dest.days||[]).reduce((s,dy)=>s+(dy.events||[]).length,0);
  const hoN=(t.hotels||[]).filter(b=>b.checkIn && b.checkOut && b.checkIn<=dest.endDate && b.checkOut>=dest.startDate).length;
  const spent=(dest.days||[]).reduce((s,dy)=>s+(dy.events||[]).reduce((s2,e)=>s2+(+e.actualCost||0),0),0);
  const bits=[
    flag?`<span class="ds-flag">${flag}</span>`:'',
    `${fmtD(dest.startDate)}–${fmtD(dest.endDate)}`,
    `<span class="ds-dot"></span>`, `${(dest.days||[]).length} ימים`,
    `<span class="ds-dot"></span>`, `${evN} אירועים`,
    hoN?`<span class="ds-dot"></span>${hoN} לינות`:'',
    spent?`<span class="ds-dot"></span>הוצא ${money(spent)}`:''
  ].filter(Boolean);
  return `<div class="dest-strip">${bits.join(' ')}</div>`;
}

const Undo={
  t:null, _restore:null, _expire:null,
  _bar(){
    let b=document.getElementById('undoBar');
    if(!b){ b=document.createElement('div'); b.id='undoBar'; document.body.appendChild(b); }
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    b.style.cssText='position:fixed;left:14px;right:14px;bottom:calc(94px + env(safe-area-inset-bottom));'
      +'z-index:9990;display:flex;align-items:center;justify-content:space-between;gap:12px;'
      +'padding:14px 16px;border-radius:16px;font-size:14px;font-weight:700;direction:rtl;'
      +'box-shadow:0 14px 34px -10px rgba(0,0,0,.5);opacity:0;transform:translateY(12px);'
      +'transition:opacity .2s, transform .24s cubic-bezier(.2,.8,.3,1);pointer-events:none;'
      +'background:'+(dark?'#F2F4F8':'#15181F')+';color:'+(dark?'#15181F':'#fff')+';';
    b.__btnColor=dark?'#3E63DD':'#8FA8FF';
    return b;
  },
  show(msg,onRestore,onExpire){
    this.finalize();
    const b=this._bar();
    b.innerHTML='<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(msg)+'</span>'
      +'<button style="background:transparent;border:0;color:'+b.__btnColor+';font-weight:800;font-size:14.5px;padding:4px 8px;flex:none" onclick="Undo.restore()">ביטול</button>';
    void b.offsetHeight;
    b.style.opacity='1'; b.style.transform='none'; b.style.pointerEvents='auto';
    haptic();
    this._restore=onRestore||null; this._expire=onExpire||null;
    this.t=setTimeout(()=>this.finalize(), 6000);
  },
  _hide(){
    const b=document.getElementById('undoBar');
    if(b){ b.style.opacity='0'; b.style.transform='translateY(12px)'; b.style.pointerEvents='none'; }
  },
  restore(){
    clearTimeout(this.t);
    const r=this._restore; this._restore=null; this._expire=null;
    this._hide();
    if(r) r();
  },
  finalize(){
    clearTimeout(this.t);
    const e=this._expire; this._restore=null; this._expire=null;
    this._hide();
    if(e) e();
  }
};
/* swipe-to-delete on day timeline events */
(function(){
  let card=null,row=null,sx=0,sy=0,dx=0,active=false;
  document.addEventListener('touchstart',e=>{
    const c=e.target.closest && e.target.closest('#evList .ev-card, #evListToday .ev-card');
    card=null; row=null; active=false; dx=0;
    if(!c) return;
    const r=c.closest('.ev');
    if(!r || !r.getAttribute('data-id') || r.classList.contains('add-ev-row') || r.classList.contains('hotel-stay-x')) return;
    card=c; row=r; sx=e.touches[0].clientX; sy=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!card) return;
    const t=e.touches[0]; dx=t.clientX-sx; const dy=t.clientY-sy;
    if(!active){
      if(Math.abs(dy)>10){ card=null; row=null; return; }
      if(dx<12) return;
      active=true; row.classList.add('sw-open');
    }
    const lim=Math.min(96, Math.max(0, dx));
    card.style.transform='translateX('+lim+'px)';
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!card) return;
    const c=card, r=row; card=null; row=null;
    if(!active){ r&&r.classList.remove('sw-open'); return; }
    const id=r.getAttribute('data-id');
    const t=activeTrip();
    const isEvent=!!(id && t && (t.destinations||[]).some(d=>(d.days||[]).some(dy=>(dy.events||[]).some(ev=>ev.id===id))));
    if(dx>=70 && isEvent){
      haptic();
      c.style.transition='transform .18s ease'; c.style.transform='translateX(115%)';
      setTimeout(()=>{ r.classList.remove('sw-open'); deleteEvent(id); }, 150);
    }else{
      c.style.transition='transform .24s cubic-bezier(.2,.8,.3,1)'; c.style.transform='';
      setTimeout(()=>{ c.style.transition=''; r.classList.remove('sw-open'); }, 260);
    }
  },{passive:true});
})();
const BUILD='4.3.1';
function buildNewer(a,b){
  const pa=String(a).split('.').map(Number), pb=String(b).split('.').map(Number);
  for(let i=0;i<3;i++){ const x=pa[i]||0, y=pb[i]||0; if(x!==y) return x>y; }
  return false;
}
async function fetchRemoteBuild(){
  try{
    const r=await fetch('./index.html?vchk='+Date.now(), {cache:'reload'});
    if(!r.ok) return null;
    const m=(await r.text()).match(/Voyage · גרסה ([\d.]+)/);
    return m? m[1] : null;
  }catch(e){ return null; }
}
async function applyUpdate(){
  try{ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); }catch(e){}
  try{ const reg=await navigator.serviceWorker.getRegistration(); if(reg) await reg.update(); }catch(e){}
  location.replace('./?u='+Date.now());
}
async function checkForUpdate(manual){
  const now=Date.now();
  if(!manual && window.__lastVchk && now-window.__lastVchk<600000) return;
  window.__lastVchk=now;
  if(manual) toast('בודק עדכון…');
  const remote=await fetchRemoteBuild();
  if(!remote){ if(manual) toast('אי אפשר לבדוק כרגע — בדוק חיבור'); return; }
  if(buildNewer(remote, BUILD)){
    toast('נמצאה גרסה '+remote+' — מעדכן ⚡');
    console.log('[UPDATE]', BUILD, '→', remote);
    setTimeout(applyUpdate, 700);
  }else if(manual){
    toast('אתה על הגרסה העדכנית ('+BUILD+') ✓');
  }
}
(function(){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.addEventListener){
      let hadController=!!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange',()=>{
        if(!hadController){ hadController=true; return; }   /* התקנה ראשונה — לא לרענן */
        if(window.__ctrlReloaded) return;
        window.__ctrlReloaded=true;
        location.reload();
      });
    }
    const prev=localStorage.getItem('tp-build');
    if(prev && prev!==BUILD) setTimeout(()=>toast('עודכן לגרסה '+BUILD+' ✓'), 900);
    localStorage.setItem('tp-build', BUILD);
    setTimeout(()=>checkForUpdate(false), 3500);
    document.addEventListener('visibilitychange',()=>{ if(!document.hidden) checkForUpdate(false); });
  }catch(e){}
})();
