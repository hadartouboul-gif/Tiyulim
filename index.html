<style>
:root{
  --bg:#F5F6F8; --card:#FFFFFF; --card2:#FBFBFC;
  --ink:#111418; --ink2:#5A6472; --ink3:#98A2B3;
  --line:#E7EAEE; --line2:#EFF1F4;
  --accent:#3E63DD; --accent-soft:rgba(62,99,221,0.10); --accent-ink:#2F4FC0;
  --green:#12946A; --green-soft:rgba(18,148,106,0.12);
  --red:#D93838; --red-soft:rgba(217,56,56,0.10);
  --amber:#C77E14; --amber-soft:rgba(199,126,20,0.12);
  --sh-sm:0 1px 2px rgba(16,24,40,.05);
  --sh-md:0 2px 4px rgba(16,24,40,.04), 0 10px 28px rgba(16,24,40,.08);
  --sh-lg:0 8px 16px rgba(16,24,40,.08), 0 24px 56px rgba(16,24,40,.16);
  --glass:rgba(245,246,248,0.82);
  --nav-h:64px;
}
html[data-theme=dark]{
  --bg:#0C0E12; --card:#15181E; --card2:#191D24;
  --ink:#F2F4F7; --ink2:#98A2B3; --ink3:#667085;
  --line:#232830; --line2:#1D222A;
  --accent:#7B96FF; --accent-soft:rgba(123,150,255,0.14); --accent-ink:#A7B8FF;
  --green:#3DCB98; --green-soft:rgba(61,203,152,0.14);
  --red:#F97066; --red-soft:rgba(249,112,102,0.13);
  --amber:#F0A93B; --amber-soft:rgba(240,169,59,0.14);
  --sh-sm:0 1px 2px rgba(0,0,0,.4);
  --sh-md:0 2px 4px rgba(0,0,0,.3), 0 12px 28px rgba(0,0,0,.45);
  --sh-lg:0 12px 24px rgba(0,0,0,.5), 0 30px 70px rgba(0,0,0,.6);
  --glass:rgba(12,14,18,0.8);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; width:100%; max-width:100%; overflow-x:hidden;}
body{overscroll-behavior-y:contain;}
html{-webkit-text-size-adjust:100%;}
img,svg,video,canvas{max-width:100%;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:'Heebo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:15px; line-height:1.5;
  transition:background .3s,color .3s;
  overscroll-behavior-y:none;
}
button{font-family:inherit;}
input,select,textarea{font-family:inherit; color:var(--ink);}
::placeholder{color:var(--ink3);}
svg.ic{display:block; flex-shrink:0;}

/* ---------- layout ---------- */
#screen{
  width:100%;
  max-width:560px; margin:0 auto;
  padding:0 16px calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 96px);
  min-height:100vh; min-height:100dvh;
  animation:pageIn .28s cubic-bezier(.2,.8,.3,1);
}
@keyframes pageIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important; transition-duration:.01ms!important;}
}

.top{
  position:sticky; top:0; z-index:20;
  background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  margin:0 -16px; padding:calc(14px + env(safe-area-inset-top,0px)) 20px 12px;
  border-bottom:1px solid transparent;
  transition:border-color .2s;
}
.top.scrolled{border-color:var(--line);}
.top-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.h1{font-size:clamp(21px,6vw,26px); font-weight:800; letter-spacing:-.01em; margin:0; overflow-wrap:anywhere;}
.sub{color:var(--ink2); font-size:13px; margin-top:2px;}
.top-actions{display:flex; gap:8px;}

.section-label{
  font-size:12px; font-weight:700; color:var(--ink3);
  letter-spacing:.06em; margin:22px 2px 10px;
  display:flex; align-items:center; gap:6px;
}

/* ---------- cards ---------- */
.card{
  background:var(--card); border:1px solid var(--line);
  border-radius:20px; box-shadow:var(--sh-sm);
}
.card.pad{padding:16px;}
.card + .card{margin-top:12px;}
.press{transition:transform .15s ease, box-shadow .2s; cursor:pointer;}
.press:active{transform:scale(.977);}

/* trip card */
.trip-card{overflow:hidden; margin-bottom:14px; box-shadow:var(--sh-md); border:none;}
.trip-cover{
  height:132px; position:relative; padding:14px 16px;
  display:flex; flex-direction:column; justify-content:space-between;
  color:#fff;
}
.trip-cover::after{content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,.34));}
.trip-cover > *{position:relative; z-index:1;}
.trip-country{font-size:12px; font-weight:600; opacity:.92; display:flex; align-items:center; gap:5px;}
.trip-name{font-size:clamp(19px,5.6vw,23px); font-weight:800; letter-spacing:-.01em; text-shadow:0 1px 10px rgba(0,0,0,.25); overflow-wrap:anywhere;}
.countdown-chip{
  align-self:flex-start; background:rgba(255,255,255,.2); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.35);
  padding:4px 11px; border-radius:20px; font-size:12px; font-weight:700;
}
.trip-meta{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; background:var(--card);
}
.trip-meta-item{display:flex; align-items:center; gap:6px; color:var(--ink2); font-size:12.5px; font-weight:500;}
.trip-menu-btn{margin-inline-start:auto;}

/* ---------- buttons ---------- */
.btn{
  border:none; border-radius:13px; padding:12px 18px;
  font-size:14.5px; font-weight:700; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  transition:transform .12s, opacity .15s, background .15s;
}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--accent); color:#fff; box-shadow:0 6px 16px rgba(62,99,221,.3);}
.btn-soft{background:var(--accent-soft); color:var(--accent-ink);}
.btn-ghost{background:var(--card2); color:var(--ink); border:1px solid var(--line);}
.btn-danger{background:var(--red-soft); color:var(--red);}
.btn-block{width:100%;}
.btn-sm{padding:8px 13px; font-size:13px; border-radius:11px;}

.icon-btn{
  width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
  background:var(--card); color:var(--ink2);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:all .15s;
}
.icon-btn:active{transform:scale(.92);}
.icon-btn.plain{border:none; background:transparent;}
.icon-btn.danger{color:var(--red);}

.fab{
  position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 20px); inset-inline-start:50%;
  transform:translateX(50%);
  z-index:47;
  width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:#fff; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 24px rgba(62,99,221,.42), 0 2px 6px rgba(0,0,0,.15);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), opacity .2s;
}
html[dir=rtl] .fab{inset-inline-start:auto; inset-inline-end:20px; transform:none;}
.fab:active{transform:scale(.88);}
.fab.hide{opacity:0; pointer-events:none; transform:scale(.6);}

/* ---------- bottom nav ---------- */
.nav{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex; justify-content:space-around; align-items:center;
  user-select:none;
}
.nav-item{
  flex:1; height:100%; border:none; background:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  color:var(--ink3); font-size:10.5px; font-weight:600;
  transition:color .18s;
  position:relative;
}
.nav-item.active{color:var(--accent);}
.nav-item .nav-pill{
  padding:4px 14px; border-radius:14px; transition:background .2s;
  display:flex;
}
.nav-item.active .nav-pill{background:var(--accent-soft);}

/* ---------- chips / pills ---------- */
.chips{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 10px; scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0; border:1px solid var(--line); background:var(--card);
  padding:8px 15px; border-radius:22px; font-size:13px; font-weight:600;
  color:var(--ink2); cursor:pointer; transition:all .15s;
  display:inline-flex; align-items:center; gap:6px;
}
.chip.active{background:var(--ink); color:var(--bg); border-color:var(--ink);}
.chip:active{transform:scale(.95);}
.day-pill{
  flex-shrink:0; width:56px; padding:9px 0; border-radius:16px;
  border:1px solid var(--line); background:var(--card);
  display:flex; flex-direction:column; align-items:center; gap:1px;
  cursor:pointer; transition:all .15s;
}
.day-pill .dow{font-size:10.5px; color:var(--ink3); font-weight:600;}
.day-pill .dnum{font-size:17px; font-weight:800;}
.day-pill .dmon{font-size:10px; color:var(--ink3);}
.day-pill.active{background:var(--accent); border-color:var(--accent); box-shadow:0 6px 14px rgba(62,99,221,.32);}
.day-pill.active .dow,.day-pill.active .dnum,.day-pill.active .dmon{color:#fff;}
.day-pill .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}
.day-pill.active .dot{background:#fff;}

.status-pill{font-size:11px; font-weight:700; padding:3px 9px; border-radius:12px;}
.st-done{background:var(--green-soft); color:var(--green);}
.st-cancelled{background:var(--red-soft); color:var(--red);}
.st-upcoming{background:var(--accent-soft); color:var(--accent-ink);}

/* ---------- timeline ---------- */
.timeline{position:relative; padding:4px 0 4px;}
.timeline::before{content:""; position:absolute; top:8px; bottom:8px; inset-inline-start:19px;
  width:2px; background:var(--line);}
.ev{
  position:relative; display:flex; gap:12px; padding:7px 0;
}
.ev-node{
  width:40px; height:40px; border-radius:14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; z-index:1; box-shadow:0 0 0 4px var(--bg);
}
.ev-card{
  flex:1; background:var(--card); border:1px solid var(--line);
  border-radius:16px; padding:11px 14px; box-shadow:var(--sh-sm);
  transition:transform .15s, box-shadow .2s; cursor:pointer; min-width:0;
}
.ev-card:active{transform:scale(.98);}
.ev.dragging .ev-card{box-shadow:var(--sh-lg); transform:scale(1.02); border-color:var(--accent);}
.ev-title{font-weight:700; font-size:14.5px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; overflow-wrap:anywhere; min-width:0;}
.ev-meta{display:flex; flex-wrap:wrap; gap:4px 12px; margin-top:3px; color:var(--ink2); font-size:12.5px;}
.ev-meta span{display:inline-flex; align-items:center; gap:4px;}
.ev-done .ev-title{text-decoration:line-through; color:var(--ink3);}
.drag-handle{touch-action:none; cursor:grab; color:var(--ink3); padding:4px; margin:-4px;}

/* ---------- summary strip ---------- */
.summary{
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin:12px 0 16px;
}
.summary>*{min-width:0;}
.summary.cols-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.sum-num{font-size:clamp(12.5px,4vw,16px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
@media (max-width:340px){ .summary, .summary.cols-3{grid-template-columns:repeat(2,minmax(0,1fr));} }
.sum-cell{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:10px 6px; text-align:center;
}
.sum-num{font-size:16px; font-weight:800;}
.sum-lbl{font-size:10.5px; color:var(--ink3); font-weight:600; margin-top:1px;}

/* ---------- forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--ink2); margin-bottom:6px;}
.inp, textarea.inp, select.inp{
  width:100%; min-width:0; border:1.5px solid var(--line); background:var(--card2);
  border-radius:13px; padding:12px 14px; font-size:16px; outline:none;
  transition:border-color .15s, background .15s;
}
.inp:focus{border-color:var(--accent); background:var(--card);}
textarea.inp{resize:vertical; min-height:76px; line-height:1.55;}
.row2{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px;}
.row2>*{min-width:0;}
@media (max-width:355px){ .row2{grid-template-columns:1fr;} }
.seg{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:13px; padding:3px; gap:3px;}
.seg button{
  flex:1; border:none; background:transparent; padding:9px 4px; border-radius:10px;
  font-size:13px; font-weight:600; color:var(--ink2); cursor:pointer; transition:all .15s;
}
.seg button.active{background:var(--card); color:var(--ink); box-shadow:var(--sh-sm); font-weight:700;}

.cover-picker{display:flex; gap:9px; flex-wrap:wrap;}
.cover-swatch{
  width:52px; height:38px; border-radius:11px; cursor:pointer;
  border:2.5px solid transparent; transition:all .15s;
}
.cover-swatch.sel{border-color:var(--ink); transform:scale(1.06);}

.type-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:9px;}
.type-cell{
  border:1.5px solid var(--line); background:var(--card2); border-radius:14px;
  padding:11px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer; transition:all .15s; color:var(--ink2);
}
.type-cell .t-ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;}
.type-cell span{font-size:10.5px; font-weight:600;}
.type-cell.sel{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink);}
.type-cell:active{transform:scale(.93);}

/* ---------- sheet ---------- */
.sheet-backdrop{
  position:fixed; inset:0; z-index:60; background:rgba(10,12,16,.45);
  opacity:0; transition:opacity .25s; backdrop-filter:blur(2px);
}
.sheet-backdrop.show{opacity:1;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:61;
  max-width:560px; margin:0 auto;
  background:var(--card); border-radius:24px 24px 0 0;
  box-shadow:var(--sh-lg);
  transform:translateY(103%); transition:transform .32s cubic-bezier(.2,.9,.3,1);
  max-height:92vh; max-height:92dvh; width:100%; display:flex; flex-direction:column;
}
.sheet.show{transform:none;}
.sheet-grab{width:40px; height:4.5px; border-radius:3px; background:var(--line); margin:10px auto 4px;}
.sheet-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 20px 12px;
}
.sheet-title{font-size:18px; font-weight:800;}
.sheet-body{padding:4px 20px calc(24px + env(safe-area-inset-bottom)); overflow-y:auto;}

/* ---------- misc ---------- */
.empty{
  text-align:center; padding:56px 24px; color:var(--ink2);
}
.empty .e-ic{
  width:68px;height:68px;border-radius:22px;background:var(--accent-soft);
  color:var(--accent-ink); display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
}
.empty h3{margin:0 0 6px; font-size:17px; color:var(--ink);}
.empty p{margin:0; font-size:13.5px;}

.toast{
  position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 18px); left:50%; transform:translate(-50%,16px);
  z-index:80; background:var(--ink); color:var(--bg);
  padding:10px 20px; border-radius:22px; font-size:13.5px; font-weight:600;
  opacity:0; pointer-events:none; transition:all .28s cubic-bezier(.2,.8,.3,1);
  box-shadow:var(--sh-lg); max-width:calc(100vw - 32px); text-align:center;
}
.toast.show{opacity:1; transform:translate(-50%,0);}

.list-row{
  display:flex; align-items:center; gap:12px; padding:13px 4px;
  border-bottom:1px solid var(--line2); cursor:pointer;
}
.list-row:last-child{border-bottom:none;}
.list-row .lr-ic{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.list-row .lr-body{flex:1; min-width:0;}
.list-row .lr-title{font-weight:700; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.list-row .lr-sub{font-size:12px; color:var(--ink2); margin-top:1px;}

.progress{height:8px; border-radius:6px; background:var(--line2); overflow:hidden;}
.progress > div{height:100%; border-radius:6px; background:var(--accent); transition:width .5s cubic-bezier(.2,.8,.3,1);}

.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.bar-lbl{width:82px; font-size:12.5px; font-weight:600; color:var(--ink2); flex-shrink:0;}
.bar-track{flex:1; height:22px; background:var(--line2); border-radius:8px; overflow:hidden;}
.bar-fill{height:100%; border-radius:8px; display:flex; align-items:center; padding:0 8px;
  font-size:11px; font-weight:700; color:#fff; min-width:fit-content; transition:width .5s;}

.stat-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:11px;}
.stat-grid>*{min-width:0;}
.stat-card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:15px;}
.stat-card .s-ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-card .s-num{font-size:22px; font-weight:800; letter-spacing:-.01em;}
.stat-card .s-lbl{font-size:12px; color:var(--ink2); font-weight:500;}

.check{
  width:23px;height:23px;border-radius:8px;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all .15s; background:var(--card); color:transparent;
}
.check.on{background:var(--green); border-color:var(--green); color:#fff;}

.search-wrap{position:relative; margin:4px 0 14px;}
.search-wrap .ic{position:absolute; inset-inline-start:14px; top:50%; transform:translateY(-50%); color:var(--ink3);}
.search-wrap input{padding-inline-start:42px;}

.menu-list{padding:4px 0;}
.menu-item{
  display:flex; align-items:center; gap:12px; padding:13px 6px;
  font-size:15px; font-weight:600; cursor:pointer; border:none; background:none;
  width:100%; text-align:start; color:var(--ink); border-radius:12px;
}
.menu-item:active{background:var(--card2);}
.menu-item.danger{color:var(--red);}
.menu-item .ic{color:var(--ink2);}
.menu-item.danger .ic{color:var(--red);}

.doc-row-fav{color:var(--amber);}
.dest-chip-dates{font-size:10.5px; opacity:.75; font-weight:500;}
.hr{height:1px; background:var(--line2); margin:14px 0; border:none;}
.mini-note{font-size:12px; color:var(--ink3); margin-top:8px; line-height:1.5;}
.link-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
a.mini-link{
  display:inline-flex; align-items:center; gap:5px; text-decoration:none;
  background:var(--card2); border:1px solid var(--line); color:var(--ink);
  padding:7px 12px; border-radius:11px; font-size:12.5px; font-weight:600;
}
.detail-grid{display:grid; grid-template-columns:auto 1fr; gap:9px 14px; font-size:13.5px;}
.detail-grid .dk{color:var(--ink3); font-weight:600;}
.detail-grid .dv{font-weight:600; word-break:break-word;}

/* ---------- v2 additions (dashboard, quick menu, journal, map...) ---------- */
.hero-card{border-radius:24px; overflow:hidden; color:#fff; position:relative; box-shadow:var(--sh-md); margin-top:12px;}
.hero-card .hero-in{position:relative; z-index:1; padding:20px 18px 18px;}
.hero-card::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.02),rgba(0,0,0,.36));}
.hero-title{font-size:clamp(20px,6vw,25px); font-weight:800; letter-spacing:-.01em; text-shadow:0 1px 12px rgba(0,0,0,.3); overflow-wrap:anywhere;}
.hero-sub{font-size:12.5px; opacity:.92; display:flex; align-items:center; gap:6px; margin-top:2px;}
.hero-prog{margin-top:16px;}
.hero-prog .progress{background:rgba(255,255,255,.28); height:7px;}
.hero-prog .progress>div{background:#fff;}
.hero-prog-lbl{display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:6px; opacity:.95;}

.tile-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:11px; margin-top:12px;}
.tile-grid>*{min-width:0;}
.tile{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px; cursor:pointer;
  transition:transform .14s; position:relative; overflow:hidden;}
.tile:active{transform:scale(.965);}
.tile .t-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;}
.tile .t-ico{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
.tile .t-num{font-size:19px; font-weight:800; letter-spacing:-.01em;}
.tile .t-lbl{font-size:12px; color:var(--ink2); font-weight:600;}
.tile .t-sub{font-size:11px; color:var(--ink3); margin-top:1px;}
.tile.wide{grid-column:1/-1;}

.demo-tag{font-size:9.5px; font-weight:700; color:var(--ink3); background:var(--line2);
  padding:2px 7px; border-radius:8px; letter-spacing:.03em;}

.next-act{display:flex; align-items:center; gap:12px;}
.next-act .na-time{font-size:11.5px; font-weight:700; color:var(--accent-ink); background:var(--accent-soft);
  padding:3px 9px; border-radius:10px; white-space:nowrap;}

/* quick add menu */
.qmenu-backdrop{position:fixed; inset:0; z-index:45; background:rgba(10,12,16,.34); backdrop-filter:blur(3px);
  opacity:0; pointer-events:none; transition:opacity .22s;}
.qmenu-backdrop.show{opacity:1; pointer-events:auto;}
.qmenu{position:fixed; z-index:46; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 88px); inset-inline-end:18px;
  max-height:calc(100dvh - var(--nav-h) - 130px); overflow-y:auto;
  display:flex; flex-direction:column; align-items:flex-end; gap:11px; pointer-events:none;}
.qmenu .q-item{display:flex; align-items:center; gap:10px; opacity:0; transform:translateY(14px) scale(.9);
  transition:all .22s cubic-bezier(.2,.9,.3,1.3); pointer-events:none;}
.qmenu.show .q-item{opacity:1; transform:none; pointer-events:auto;}
.q-item .q-lbl{background:var(--card); border:1px solid var(--line); box-shadow:var(--sh-sm);
  padding:6px 13px; border-radius:12px; font-size:13px; font-weight:700;}
.q-item .q-ico{width:44px;height:44px;border-radius:15px;display:flex;align-items:center;justify-content:center;
  color:#fff; box-shadow:var(--sh-md); cursor:pointer;}
.q-item:active .q-ico{transform:scale(.9);}
.fab .ic{transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.fab.open .ic{transform:rotate(135deg);}

/* timeline v2 */
.timeline .ev{animation:evIn .34s cubic-bezier(.2,.8,.3,1) both;}
.no-anim .ev{animation:none !important;}
@keyframes evIn{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
.now-row{display:flex; align-items:center; gap:10px; padding:4px 0; position:relative;}
.now-dot{width:12px; height:12px; border-radius:50%;  margin-inline-start:14px;
    z-index:1;
  background:var(--red); box-shadow:none; width:9px; height:9px;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--red-soft);} 50%{box-shadow:0 0 0 8px var(--red-soft);}}
.now-track{flex:1; display:flex; align-items:center; gap:8px;}
.now-track::after{content:""; flex:1; height:2px; background:var(--red); opacity:.5; border-radius:2px;}
.now-track span{font-size:11px; font-weight:800; color:var(--red);}
.day-pill.is-today{border-color:var(--accent);}

/* destination cover */
.dest-cover{border-radius:20px; overflow:hidden; position:relative; margin:2px 0 14px; box-shadow:var(--sh-md); height:118px;}
.dest-cover svg{position:absolute; inset:0; width:100%; height:100%;}
.dest-cover .dc-in{position:absolute; inset:0; z-index:1; padding:14px 16px; display:flex;
  flex-direction:column; justify-content:flex-end; color:#fff;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.42));}
.dc-name{font-size:21px; font-weight:800; text-shadow:0 1px 10px rgba(0,0,0,.35);}
.dc-dates{font-size:12px; font-weight:600; opacity:.94;}
.dc-menu{position:absolute; top:10px; inset-inline-start:10px; z-index:2;
  width:34px; height:34px; border-radius:12px; border:1px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.22); backdrop-filter:blur(6px); color:#fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .14s;}
.dc-menu:active{transform:scale(.9);}
.add-ev-row .ev-node{background:var(--card2) !important; color:var(--ink3); border:1.5px dashed var(--line);}
.add-ev-row .ev-card{background:transparent; border:1.5px dashed var(--line); box-shadow:none;
  color:var(--ink2); font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:8px;}
.add-ev-row .ev-card:active{transform:scale(.985); background:var(--card2);}

/* pull to refresh */
#ptr{position:fixed; top:calc(env(safe-area-inset-top,0px) + 8px); left:50%;
  transform:translate(-50%,-64px) scale(.6); opacity:0; z-index:58;
  width:38px; height:38px; border-radius:50%;
  background:var(--card); border:1px solid var(--line);
  box-shadow:0 8px 24px rgba(15,23,42,.18);
  display:flex; align-items:center; justify-content:center; pointer-events:none;}
#ptr svg{width:22px; height:22px; display:block;}
#ptr .ptr-arc{fill:none; stroke:var(--accent); stroke-width:2.6; stroke-linecap:round;
  stroke-dasharray:56.6; stroke-dashoffset:56.6;}
#ptr.spin svg{animation:ptrspin .8s linear infinite;}
#ptr.spin .ptr-arc{stroke-dashoffset:14; transition:stroke-dashoffset .18s;}
@keyframes ptrspin{to{transform:rotate(360deg);}}

/* journal */
.journal-card{margin:0 0 16px;}
.jr-head{display:flex; align-items:center; justify-content:space-between; padding:13px 15px; cursor:pointer;}
.jr-head .jr-t{font-weight:800; font-size:14.5px; display:flex; align-items:center; gap:8px;}
.jr-body{display:none; padding:0 15px 15px;}
.journal-card.open .jr-body{display:block;}
.mood-row{display:flex; gap:8px; margin-bottom:12px;}
.mood{flex:1; font-size:23px; padding:8px 0; border-radius:13px; border:1.5px solid var(--line);
  background:var(--card2); cursor:pointer; text-align:center; transition:all .15s; filter:grayscale(.9); opacity:.75;}
.mood.sel{border-color:var(--accent); background:var(--accent-soft); filter:none; opacity:1; transform:scale(1.06);}
.stars{display:flex; gap:5px; margin-bottom:12px;}
.stars button{border:none; background:none; cursor:pointer; padding:2px; color:var(--line);}
.stars button.on{color:var(--amber);}
.photo-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px;}
.photo-th{aspect-ratio:1; border-radius:12px; object-fit:cover; width:100%; cursor:pointer; border:1px solid var(--line);}
.photo-add{aspect-ratio:1; border-radius:12px; border:1.5px dashed var(--line); background:var(--card2);
  display:flex; align-items:center; justify-content:center; color:var(--ink3); cursor:pointer;}

/* map */
.map-box{position:relative; border-radius:20px; overflow:hidden; border:1px solid var(--line);
  height:300px; box-shadow:var(--sh-md); background:#E8EDF2;}
html[data-theme=dark] .map-box{background:#151A21;}
.map-pin{position:absolute; transform:translate(50%,-100%); cursor:pointer; z-index:2; transition:transform .15s;}
.map-pin:active{transform:translate(50%,-100%) scale(.9);}
.map-pin .mp-dot{width:30px;height:30px;border-radius:50% 50% 50% 4px; transform:rotate(45deg);
  display:flex;align-items:center;justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,.3); border:2px solid #fff;}
.map-pin .mp-dot .ic{transform:rotate(-45deg); color:#fff;}
.map-note{position:absolute; bottom:8px; inset-inline-start:8px; z-index:3;}

/* stats v2 */
.ring-wrap{display:flex; align-items:center; gap:16px;}
.ring{transform:rotate(-90deg);}
.ring .bgc{stroke:var(--line2);}
.ring .fgc{stroke:var(--accent); transition:stroke-dashoffset .7s cubic-bezier(.2,.8,.3,1);}
.ring-num{font-size:19px; font-weight:800;}

/* skeleton */
@keyframes shimmer{0%{background-position:180% 0;}100%{background-position:-20% 0;}}
.sk{border-radius:16px; background:linear-gradient(90deg,var(--line2) 25%,var(--card) 50%,var(--line2) 75%);
  background-size:200% 100%; animation:shimmer 1.3s infinite linear;}

.wl-actions{display:flex; gap:8px; margin-top:10px;}
.contact-ic{background:var(--red-soft); color:var(--red);}
.flight-board{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin:8px 0 14px;}
.flight-board>*{min-width:0;}
.fb-cell{background:var(--card2); border:1px solid var(--line); border-radius:13px; padding:10px 12px;}
.fb-k{font-size:10.5px; font-weight:700; color:var(--ink3); letter-spacing:.04em;}
.fb-v{font-size:16px; font-weight:800; margin-top:2px;}

/* sharing */
.share-opt{display:flex;align-items:center;gap:13px;padding:15px;border:1.5px solid var(--line);
  border-radius:16px;background:var(--card2);cursor:pointer;transition:all .15s;margin-bottom:11px;text-align:start;width:100%;font-family:inherit;}
.share-opt:active{transform:scale(.975);}
.share-opt .so-ic{width:44px;height:44px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
.share-opt b{font-size:15px;display:block;}
.share-opt p{margin:3px 0 0;font-size:12.5px;color:var(--ink2);line-height:1.45;}
.share-code{display:flex;justify-content:center;gap:7px;margin:14px 0;direction:ltr;}
.share-code span{width:min(40px,11vw);height:48px;border-radius:11px;background:var(--card2);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:ui-monospace,SFMono-Regular,monospace;}
.sync-chip{display:inline-flex;align-items:center;gap:5px;}




/* ==== VOYAGE PHASE 3 · POLISH ==== */
.qmenu, .qmenu-backdrop{display:none !important;}
.hero-card{position:relative;}
.live-pill{position:absolute; top:12px; inset-inline-start:12px; z-index:2;
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(0,0,0,.30); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  color:#fff; font-size:11px; font-weight:800; letter-spacing:.3px;
  padding:5px 10px; border-radius:999px;}
.live-pill::before{content:''; width:7px; height:7px; border-radius:50%;
  background:var(--red); box-shadow:none;}
.live-ind{display:inline-block; width:7px; height:7px; border-radius:50%;
  background:var(--red); margin-inline-end:5px; vertical-align:0.5px;}
.press{transition:transform .16s cubic-bezier(.2,.8,.3,1), box-shadow .16s;}
.press:active{transform:scale(.965);}
.icon-btn{transition:transform .14s, background .14s;}
.icon-btn:active{transform:scale(.9);}
.chip{transition:background .15s, color .15s, border-color .15s, transform .14s;}
.chip:active{transform:scale(.95);}
.btn{transition:transform .15s, filter .15s, box-shadow .15s;}
.btn:active{transform:scale(.97); filter:brightness(.97);}
.list-row{transition:background .15s;}
#undoBar{position:fixed; inset-inline:14px; bottom:calc(76px + env(safe-area-inset-bottom));
  z-index:130; display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:var(--ink); color:var(--bg); border-radius:16px; padding:13px 16px;
  font-size:13.5px; font-weight:700; box-shadow:0 12px 30px -10px rgba(0,0,0,.45);
  opacity:0; transform:translateY(14px); pointer-events:none;
  transition:opacity .22s, transform .26s cubic-bezier(.2,.8,.3,1);}
#undoBar.show{opacity:1; transform:none; pointer-events:auto;}
#undoBar button{background:transparent; border:0; color:var(--accent-soft, #9DB4FF);
  font-weight:800; font-size:13.5px; padding:4px 6px;}
[data-theme=dark] #undoBar{background:#F2F4F8; color:#12151B;}
.ev{position:relative;}
.ev.sw-open::after{content:'מחיקה'; position:absolute; top:6px; bottom:6px; left:10px;
  display:flex; align-items:center; padding:0 14px; border-radius:14px;
  background:var(--red); color:#fff; font-size:12.5px; font-weight:800; z-index:0;}
.ev .ev-card{position:relative; z-index:1; background:var(--card);}
.sk{position:relative; overflow:hidden; background:var(--line2); border-radius:12px;}
.sk::after{content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, color-mix(in srgb, var(--card) 55%, transparent), transparent);
  animation:skSh 1.2s infinite;}
@keyframes skSh{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.sk-row{height:52px; margin-bottom:10px;}
.mem-av{font-weight:800; font-size:15px;}
.empty{padding-top:8px;}
.empty b{font-size:15.5px;}
.progress{height:9px; border-radius:99px; overflow:hidden;}
.progress > div{border-radius:99px; transition:width .5s cubic-bezier(.2,.8,.3,1);}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important; transition-duration:.01ms !important;}
}

/* ==== VOYAGE PHASE 2 ==== */
#evList, #evListToday{position:relative;}
#evList::before, #evListToday::before{content:''; position:absolute; top:14px; bottom:14px;
  inset-inline-start:19px; width:2px; border-radius:2px;
  background:linear-gradient(180deg, transparent, var(--line2) 8%, var(--line2) 92%, transparent);}
.ev{position:relative;}
.ev-node{position:relative; z-index:1;}
.ev-card{border-radius:16px; box-shadow:0 1px 2px rgba(16,24,40,.04);}
.today-mode .ev-card{font-size:15px; padding:14px 15px;}
.today-mode .ev-node{transform:scale(1.12);}
.today-hero{border-radius:22px; padding:18px 16px; margin-bottom:14px; color:#fff; position:relative; overflow:hidden;}
.today-hero .th-date{font-size:12.5px; opacity:.85; font-weight:700;}
.today-hero .th-title{font-size:22px; font-weight:800; margin-top:2px;}
.today-hero .th-sub{font-size:13px; opacity:.9; margin-top:4px; display:flex; gap:8px; align-items:center;}
.dest-strip{display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:var(--card2); border:1px solid var(--line); border-radius:16px;
  padding:10px 13px; margin:10px 0 4px; font-size:12.5px; font-weight:700; color:var(--ink2);}
.dest-strip .ds-flag{font-size:16px;}
.dest-strip .ds-dot{width:3px; height:3px; border-radius:50%; background:var(--ink3); opacity:.6;}
.plan-nav{position:sticky; top:-14px; z-index:5; display:flex; gap:7px; overflow-x:auto;
  padding:10px 2px; margin:-6px 0 4px; background:var(--card);
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);}

/* ==== VOYAGE BOOT BEACON ==== */
window.__bootErrs=[]; window.__appRendered=false;
(function(){
  function rec(m,src,ln,col){ try{ window.__bootErrs.push({m:String(m||''),src:String(src||''),ln:ln||0,col:col||0}); }catch(e){} }
  window.addEventListener('error',function(e){
    if(e && e.message) rec(e.message, e.filename, e.lineno, e.colno);
    else rec('כשל בטעינת משאב', (e&&e.target&&(e.target.src||e.target.href))||'', 0, 0);
  }, true);
  window.addEventListener('unhandledrejection',function(e){
    var r=e&&e.reason; rec('Promise: '+((r&&r.message)||r), '', 0, 0);
  });
  setTimeout(function(){
    if(window.__appRendered) return;
    var lines=window.__bootErrs.map(function(x){
      var ext=/script error/i.test(x.m) && !x.ln;
      return '- '+(ext?'[CDN] ':'')+x.m+(x.ln?(' @'+x.ln+':'+x.col):'')+(x.src?(' ('+x.src.split('/').pop()+')'):'');
    });
    var report=lines.join('\n') || '(no captured errors — most likely an old cached version on this device)';
    var d=document.createElement('div');
    d.style.cssText='position:fixed;inset:0;z-index:99999;background:#0C0E12;color:#fff;padding:28px 20px;font:14px/1.6 -apple-system,sans-serif;direction:rtl;overflow:auto';
    var h=document.createElement('div'); h.style.cssText='font-weight:800;font-size:17px;margin-bottom:6px'; h.textContent='Voyage לא הצליח לעלות'; d.appendChild(h);
    var sub=document.createElement('div'); sub.style.cssText='opacity:.7;font-size:12px;margin-bottom:14px';
    sub.textContent='גרסה 4.0.2 · '+((navigator.serviceWorker&&navigator.serviceWorker.controller)?'Service Worker פעיל':'ללא Service Worker');
    d.appendChild(sub);
    var pre=document.createElement('pre');
    pre.style.cssText='white-space:pre-wrap;background:#161A22;border-radius:14px;padding:14px;font-size:12px;direction:ltr;text-align:left;word-break:break-word';
    pre.textContent=report; d.appendChild(pre);
    var btn=document.createElement('button');
    btn.style.cssText='margin-top:10px;padding:12px 16px;border-radius:12px;border:0;background:#3E63DD;color:#fff;font-weight:700';
    btn.textContent='העתקת הדוח';
    btn.onclick=function(){ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(pre.textContent); else prompt('העתק:',pre.textContent); };
    d.appendChild(btn);
    var tip=document.createElement('div');
    tip.style.cssText='margin-top:16px;font-size:12.5px;opacity:.8';
    tip.textContent='נסה: סגירה מלאה של האפליקציה ופתיחה מחדש פעמיים. אם לא עוזר — הגדרות ← Safari ← Advanced ← Website Data ← מחיקת האתר, ואז פתיחה מחדש.';
    d.appendChild(tip);
    (document.body||document.documentElement).appendChild(d);
  }, 4000);
})();
</script>

/* ==== DATE HELPERS — local calendar dates only, no UTC conversion ==== */
function fmtYMD(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr(){ return fmtYMD(new Date()); }
function pd(s){
  const p=String(s||'').split('-');
  const y=+p[0], m=+p[1], d=+p[2];
  if(!y||!m||!d) return new Date(NaN);
  return new Date(y, m-1, d); /* local midnight — the exact calendar date the user picked */
}
function addDays(s,n){ const d=pd(s); d.setDate(d.getDate()+n); return fmtYMD(d); }
function diffDays(a,b){ return Math.round((pd(b)-pd(a))/86400000); }
function fmtD(s,opts){
  if(!s) return '—';
  const d=pd(s);
  if(isNaN(d)) return s;
  try{ return d.toLocaleDateString('he-IL',opts||{day:'numeric',month:'short'}); }catch(e){ return s; }
}
function rangeDays(start,end){
  if(!start||!end) return [];
  const out=[]; const d=pd(start), e=pd(end); let g=0;
  if(isNaN(d)||isNaN(e)) return out;
  while(d<=e && g<180){ out.push(fmtYMD(d)); d.setDate(d.getDate()+1); g++; }
  return out;
}
/* ==== END DATE HELPERS ==== */
function money(n){ if(n==null||isNaN(n)) return '—'; return S.settings.currency + Number(n).toLocaleString('he-IL',{maximumFractionDigits:0}); }
function fmtSize(b){ if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function fmtMin(m){ if(!m) return ''; const h=Math.floor(m/60), mm=m%60; return h? (h+':'+String(mm).padStart(2,'0')+' שע׳') : (mm+' דק׳'); }

const __warned={};
function warnOnce(tag,msg,e){
  if(__warned[tag]) return; __warned[tag]=true;
  console.warn('[טיולים] '+msg+(e&&e.message?' — '+e.message:''));

/* Key-value store for app state: localStorage → window.storage bridge → in-memory */
const Store=(()=>{
  const mem=new Map();
  let mode='memory';
  try{
    const t='__voyage_test__';
    window.localStorage.setItem(t,'1');
    window.localStorage.removeItem(t);
    mode='local';
  }catch(e){
    if(typeof window.storage==='object' && window.storage && typeof window.storage.get==='function') mode='bridge';
    else warnOnce('nostore','אחסון מתמשך אינו זמין בסביבה זו — הנתונים יישמרו לסשן הנוכחי בלבד',e);
  }
  async function get(key){
    if(mode==='local'){
      try{ return window.localStorage.getItem(key); }
      catch(e){ warnOnce('lsget','קריאה מ-localStorage נכשלה',e); return mem.get(key)||null; }
    }
    if(mode==='bridge'){
      try{
        const r=await window.storage.get(key,false);
        return (r && typeof r.value==='string') ? r.value : null;
      }catch(e){ return mem.get(key)||null; } /* missing keys throw by design — stay quiet */
    }
    return mem.has(key)?mem.get(key):null;
  }
  async function set(key,val){
    mem.set(key,val);
    if(mode==='local'){
      try{ window.localStorage.setItem(key,val); return true; }
      catch(e){ warnOnce('lsset','כתיבה ל-localStorage נכשלה (ייתכן שהמכסה מלאה)',e); return false; }
    }
    if(mode==='bridge'){
      try{
        const r=await window.storage.set(key,val,false);
        if(!r) throw new Error('invalid response');
        return true;
      }catch(e){
        warnOnce('brset','אחסון הענן לא זמין — עובר לשמירה זמנית בזיכרון',e);
        mode='memory'; /* degrade once, never spam again */
        return false;
      }
    }
    return false;
  }
  async function del(key){
    mem.delete(key);
    if(mode==='local'){ try{ window.localStorage.removeItem(key); }catch(e){} }
    else if(mode==='bridge'){ try{ await window.storage.delete(key,false); }catch(e){} }
  }
  return {get,set,del,mode:()=>mode};
})();
/* Blob store for uploaded documents: IndexedDB → window.storage bridge → in-memory */
const FileStore=(()=>{
  const mem=new Map();
  let dbP=null;
  function openDB(){
    if(dbP) return dbP;
    dbP=new Promise((res,rej)=>{
      try{
        if(!window.indexedDB) throw new Error('indexedDB unavailable');
        const rq=indexedDB.open('voyage-files',1);
        rq.onupgradeneeded=()=>{ rq.result.createObjectStore('files'); };
        rq.onsuccess=()=>res(rq.result);
        rq.onerror=()=>rej(rq.error||new Error('idb open failed'));
        rq.onblocked=()=>rej(new Error('idb blocked'));
      }catch(e){ rej(e); }
    });
    dbP.catch(()=>{}); /* avoid unhandled rejection noise */
    return dbP;
  }
  async function idb(rw,fn){
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('files',rw);
      const rq=fn(tx.objectStore('files'));
      rq.onsuccess=()=>res(rq.result);
      rq.onerror=()=>rej(rq.error||new Error('idb op failed'));
    });
  }
  async function put(key,val){
    try{ await idb('readwrite',st=>st.put(val,key)); return true; }
    catch(e){ warnOnce('idbput','IndexedDB לא זמין לקבצים — משתמש באחסון חלופי',e); }
    try{
      if(window.storage && typeof window.storage.set==='function'){
        const r=await window.storage.set(key,val,false);
        if(r) return true;
      }
    }catch(e){}
    mem.set(key,val);
    warnOnce('filemem','קבצים נשמרים זמנית בזיכרון בלבד בסביבה זו');
    return false;
  }
  async function get(key){
    try{
      const v=await idb('readonly',st=>st.get(key));
      if(v!=null) return v;
    }catch(e){}
    if(mem.has(key)) return mem.get(key);
    /* lazy migration from the old bridge storage */
    try{
      if(window.storage && typeof window.storage.get==='function'){
        const r=await window.storage.get(key,false);
        if(r && typeof r.value==='string'){
          put(key,r.value); /* fire-and-forget copy into IndexedDB */
          return r.value;
        }
      }
    }catch(e){}
    return null;
  }
  async function del(key){
    try{ await idb('readwrite',st=>st.delete(key)); }catch(e){}
    mem.delete(key);
    try{ if(window.storage && typeof window.storage.delete==='function') await window.storage.delete(key,false); }catch(e){}
  }
  return {put,get,del};
})();
/* ==== END STORAGE ADAPTERS ==== */

/* ================= DRAG REORDER ================= */
function enableDrag(container, itemSel, handleSel, onDone){
  container.querySelectorAll(handleSel).forEach(h=>{
    h.addEventListener('pointerdown', ev=>{
      ev.preventDefault();
      const item = ev.target.closest(itemSel);
      if(!item) return;
      item.classList.add('dragging');
      h.setPointerCapture(ev.pointerId);
      haptic();
      const move = e=>{
        const y=e.clientY;
        const sibs=[...container.querySelectorAll(itemSel)].filter(x=>x!==item);
        for(const sib of sibs){
          const r=sib.getBoundingClientRect();
          const mid=r.top+r.height/2;
          if(y<mid && sib.compareDocumentPosition(item)&Node.DOCUMENT_POSITION_FOLLOWING){
            container.insertBefore(item,sib); break;
          }
          if(y>mid && sib.compareDocumentPosition(item)&Node.DOCUMENT_POSITION_PRECEDING){
            container.insertBefore(item,sib.nextSibling); break;
          }
        }
      };
      const up = ()=>{
        item.classList.remove('dragging');
        h.removeEventListener('pointermove',move);
        h.removeEventListener('pointerup',up);
        h.removeEventListener('pointercancel',up);
        const ids=[...container.querySelectorAll(itemSel)].map(x=>x.dataset.id);
        onDone(ids);
      };
      h.addEventListener('pointermove',move);
      h.addEventListener('pointerup',up);
      h.addEventListener('pointercancel',up);
    });
  });
}

function tripCard(t){

    + (t.destinations||[]).reduce((s,d)=>s+(d.days||[]).reduce((s2,dy)=>s2+(dy.events||[]).reduce((s3,e)=>s3+(+e.actualCost||0),0),0),0);
  const flag=(typeof countryFlag==='function')?countryFlag(t.country):'';
  return `<div class="card trip-card press" onclick="openTripItinerary('${t.id}')">
    <div class="tc-stats">
      <div class="tc-stat"><b>${(t.destinations||[]).length}</b><span>יעדים</span></div>
      <div class="tc-stat"><b>${dur||0}</b><span>ימים</span></div>

    <div class="trip-cover" style="background:${COVERS[t.cover||0]}">

        <span class="countdown-chip">${tripCountdown(t)}</span>
        ${t.cloud?`<span class="countdown-chip sync-chip" data-shp="${t.cloud.id}">${typeof CloudSync!=='undefined'?CloudSync.label(t.cloud.id):'☁'}</span>`:(t.share?`<span class="countdown-chip sync-chip" data-shp="${t.share.code}">${typeof ShareSync!=='undefined'?ShareSync.label(t.share.code):'משותף'}</span>`:'')}
        ${t.cloud&&t.cloud.role==='view'?'<span class="countdown-chip" style="background:rgba(255,255,255,.32)">צפייה</span>':''}
        ${t.id===S.activeTripId?'<span class="countdown-chip" style="background:rgba(255,255,255,.32)">פעיל</span>':''}
      </div>
      <div>
        <div class="trip-country">${flag?`<span class="tc-flag">${flag}</span>`:ic('pin',13)} ${esc(t.country)||'ללא מדינה'}</div>
        <div class="trip-name">${esc(t.name)||'טיול ללא שם'}</div>
      </div>
    </div>

      <span class="trip-meta-item">${ic('calendar',15)} ${fmtD(d.start)} – ${fmtD(d.end)} · ${dur} ימים</span>

    </div>

      <div class="progress" style="height:6px"><div style="width:${Math.round(pr.current/pr.total*100)}%"></div></div>
      <div style="font-size:11.5px;color:var(--ink2);font-weight:600;margin-top:5px">יום ${pr.current} מתוך ${pr.total}</div>
    </div>`:''}
  </div>`;
}

async function deleteTrip(id){
  closeSheet();
  const t0=S.trips.find(x=>x.id===id);
  const isGuest=t0&&t0.cloud&&t0.cloud.role!=='owner';
  const ok=await confirmDialog(isGuest?'תוסר מהטיול המשותף. הוא יישאר אצל הבעלים והמשתתפים האחרים.':'הטיול יימחק לצמיתות, כולל כל הימים, האירועים וההוצאות שבו.',true);
  if(!ok) return;
  if(t0&&t0.cloud&&typeof CloudAPI!=='undefined'){
    try{
      if(t0.cloud.role==='owner') await CloudAPI.deleteTrip(t0.cloud.id);
      else await CloudAPI.removeMember(t0.cloud.id, Auth.user().id);
    }catch(e){ toast('הפעולה בענן נכשלה — נסה שוב'); return; }
  }
  S.trips=S.trips.filter(t=>t.id!==id);
  if(S.activeTripId===id) S.activeTripId=S.trips[0]?S.trips[0].id:null;
  save('הטיול נמחק'); render();
}

function saveTripForm(id){
  const name=document.getElementById('tf-name').value.trim();

  const sel=document.querySelector('#coverPick .cover-swatch.sel');
  const data={
    name, country:document.getElementById('tf-country').value.trim(),
    startDate:document.getElementById('tf-start').value||todayStr(),
    endDate:document.getElementById('tf-end').value||todayStr(),
    cover: sel? +sel.dataset.i : 0,
    notes:document.getElementById('tf-notes').value
  };
  if(id){ Object.assign(tripById(id),data); save('נשמר'); closeSheet(); render(); return; }
  const t=Object.assign(newTripObj(),data);
  console.log('[TRIP-CREATE 1/6] טיוטת טיול', {localId:t.id, name:t.name});
  if(typeof CloudSync!=='undefined' && CloudSync.active()){
    /* מחוברים: הענן קודם. אם ה-INSERT נכשל — לא מעמידים פנים שנשמר. */
    const btn=document.getElementById('tf-save');
    const errEl=document.getElementById('tf-err');
    if(btn){ btn.disabled=true; btn.textContent='שומר בענן…'; }

    return CloudSync.adoptTrip(t).then(()=>{
      window.__tfDraft=null;
      S.trips.unshift(t); S.activeTripId=t.id;
      save(); closeSheet(); render();
      toast('☁ הטיול נשמר בענן ✓');
    }).catch(e=>{
      if(btn){ btn.disabled=false; btn.textContent='יצירת הטיול'; }
      const raw=String(e&&e.message||'שגיאה לא ידועה')+(e&&e.code?(' ['+e.code+']'):'');
      if(errEl){
        errEl.innerHTML='<b>Supabase:</b> '+esc(raw)+'<br>'+esc(sbErrorHe(e))
          +' · <a style="color:var(--accent-ink);text-decoration:underline;cursor:pointer" onclick="closeSheet(); openCloudDoctor()">אבחון ותיקון</a>'
          +'<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="saveTripLocalOnly()">שמירה במכשיר בלבד (ללא ענן)</button></div>';
      }else{
        toast('שמירת הטיול בענן נכשלה: '+sbErrorHe(e));
      }
    });
  }
  S.trips.unshift(t); S.activeTripId=t.id;
  save('נשמר במכשיר'); closeSheet(); render();
  if(sbBase() && !Auth.session) toast('הטיול נשמר במכשיר בלבד — התחבר כדי לשמור בענן');
}

function dayPillsHTML(dest, activeDayId, today){
  return dest.days.map(d=>{
    const dt=pd(d.date);
    return `<button class="day-pill ${d.id===activeDayId?'active':''} ${d.date===today?'is-today':''}" onclick="UI.dayId='${d.id}';render()">

      ${d.events.length?'<span class="dot"></span>':''}
    </button>`;}).join('');
}
function dayTimelineHTML(t, day, today){
  const stays=hotelsForDate(t, day.date);
  const rows=day.events.map((e,i)=>eventRow(e,i));
  if(day.date===today){
    const cur=new Date(), hm=String(cur.getHours()).padStart(2,'0')+':'+String(cur.getMinutes()).padStart(2,'0');
    let idx=day.events.findIndex(e=>e.time && e.time>hm);
    if(idx===-1) idx=day.events.length;
    rows.splice(idx,0,`<div class="now-row"><div class="now-dot"></div><div class="now-track"><span>עכשיו · ${hm}</span></div></div>`);
  }
  const outRows=stays.filter(b=>hotelDayMode(b,day.date)==='out').map(b=>hotelStayRow(b,'out'));
  const inRows=stays.filter(b=>['in','inout'].includes(hotelDayMode(b,day.date))).map(b=>hotelStayRow(b,hotelDayMode(b,day.date)));
  const midRows=stays.filter(b=>hotelDayMode(b,day.date)==='stay').map(b=>hotelStayRow(b,'stay'));
  return outRows.join('')+rows.join('')+midRows.join('')+inRows.join('')
    +`<div class="ev add-ev-row">
        <div class="ev-node">${ic('plus',18)}</div>
        <div class="ev-card" onclick="openEventForm()">${ic('plus',15)} הוספת אירוע ליום הזה</div>
      </div>`;
}
function hotelStayRow(b,mode){
  const lbl=mode==='in'?'צ׳ק-אין':(mode==='out'?'צ׳ק-אאוט':(mode==='inout'?'צ׳ק-אין / צ׳ק-אאוט':'לינה במלון'));
  const time=mode==='in'?b.checkInTime:(mode==='out'?b.checkOutTime:'');
  const meta=[];
  if(time) meta.push(`<span>${ic('clock',13)}${esc(time)}</span>`);
  if(mode==='in') meta.push(`<span>${ic('calendar',13)}${hotelNights(b)} לילות · עד ${fmtD(b.checkOut)}</span>`);
  if(mode==='stay') meta.push(`<span style="color:var(--ink3)">שוהים במלון</span>`);
  if(b.address&&mode!=='stay') meta.push(`<span>${ic('pin',13)}${esc(b.address.slice(0,24))}${b.address.length>24?'…':''}</span>`);
  return `<div class="ev">
    <div class="ev-node" style="background:#8250DF">${ic('hotel',19)}</div>
    <div class="ev-card" style="background:linear-gradient(to left, rgba(130,80,223,.05), transparent 55%)" onclick="openHotelDetail('${b.id}')">
      <div class="ev-title">${esc(b.name)} <span class="status-pill" style="background:rgba(130,80,223,.12);color:#8250DF">${lbl}</span></div>
      <div class="ev-meta">${meta.join('')}</div>
    </div>
  </div>`;
}
function daySummary(day){
  const evs=day.events;
  const est=evs.reduce((s,e)=>s+(+e.estCost||0),0);
  const act=evs.reduce((s,e)=>s+(+e.actualCost||0),0);
  const walk=evs.filter(e=>e.type==='walk').reduce((s,e)=>s+(+e.duration||0),0);
  const trans=evs.filter(e=>['flight','train','metro','bus','taxi','car','bike'].includes(e.type)).length;
  const cells=[
    {n:evs.length, l:'פעילויות'},
    {n:trans, l:'תחבורה'},
    {n:act?money(act):money(est), l:act?'הוצא':'צפוי'}
  ];
  if(walk>0) cells.push({n:fmtMin(walk), l:'הליכה'});
  return `<div class="summary ${cells.length===3?'cols-3':''}" id="daySummary">${cells.map(c=>`
    <div class="sum-cell"><div class="sum-num">${c.n}</div><div class="sum-lbl">${c.l}</div></div>`).join('')}</div>`;
}
function eventRow(e,i){
  const t=evType(e.type);
  const meta=[];
  if(e.time) meta.push(`<span>${ic('clock',13)}${esc(e.time)}${e.duration?' · '+fmtMin(+e.duration):''}</span>`);
  else if(e.duration) meta.push(`<span>${ic('clock',13)}${fmtMin(+e.duration)}</span>`);
  if(e.address) meta.push(`<span>${ic('pin',13)}${esc(e.address.slice(0,26))}${e.address.length>26?'…':''}</span>`);
  const cost=e.actualCost||e.estCost;
  if(cost) meta.push(`<span>${ic('money',13)}${money(+cost)}</span>`);
  let pill='';
  if(e.status==='done') pill='<span class="status-pill st-done">בוצע</span>';
  else if(e.status==='cancelled') pill='<span class="status-pill st-cancelled">בוטל</span>';
  else if(e.priority==='high') pill='<span class="status-pill st-upcoming">חובה</span>';

function openDestForm(id){
  const t=activeTrip(); if(!t) return;
  const d=id? t.destinations.find(x=>x.id===id):null;
  const place=window.__destPlace||null; window.__destPlace=null;
  window.__destPending=(!d && place)?place:null;
  let defStart, defEnd;
  if(d){ defStart=d.startDate; defEnd=d.endDate; }
  else if(place){
    const ref=t.destinations.find(x=>x.id===place.refId);
    if(place.where==='before'){ defStart=addDays(ref.startDate,-2); defEnd=addDays(ref.startDate,-1); }
    else{ defStart=addDays(ref.endDate,1); defEnd=addDays(ref.endDate,2); }
  }else{
    const last=t.destinations[t.destinations.length-1];
    defStart=last?addDays(last.endDate,1):(t.startDate||todayStr());
    defEnd=addDays(defStart,2);
  }
  openSheet(d?'עריכת יעד':'יעד חדש', `
    <div class="field"><label>שם היעד</label>
      <input class="inp" id="df-name" placeholder="לאן? חיפוש בכל שפה — Tokyo · טוקיו · 東京" autocomplete="off" value="${d?esc(d.name):''}" oninput="destSuggest(this.value)"></div>
    <div id="df-sugg"></div>
    <div class="row2">
      <div class="field"><label>מתאריך</label><input class="inp" type="date" id="df-start" value="${defStart}"></div>
      <div class="field"><label>עד תאריך</label><input class="inp" type="date" id="df-end" value="${defEnd}"></div>
    </div>
    <div class="field"><label>הערות</label>
      <textarea class="inp" id="df-notes" placeholder="שכונות מומלצות, JR pass…">${d?esc(d.notes||''):''}</textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveDestForm('${id||''}')">${d?'שמירה':'הוספת היעד'}</button>`);
}
function saveDestForm(id){
  const t=activeTrip(); if(!t) return;
  const name=document.getElementById('df-name').value.trim();
  const start=document.getElementById('df-start').value, end=document.getElementById('df-end').value;
  if(!name){ toast('תן שם ליעד'); return; }
  if(!start||!end||pd(start)>pd(end)){ toast('בדוק את התאריכים'); return; }
  if(id){
    const d=t.destinations.find(x=>x.id===id);
    Object.assign(d,{name,startDate:start,endDate:end,notes:document.getElementById('df-notes').value});
    syncDestDays(d);
  }else{
    const d={id:uid(),name,startDate:start,endDate:end,notes:document.getElementById('df-notes').value,days:[]};
    syncDestDays(d);
    const pick=window.__destPick; window.__destPick=null;
    if(pick && !t.country && pick.countryHe) t.country=pick.countryHe;
    const place=window.__destPending; window.__destPending=null;
    let idx=t.destinations.length;
    if(place){
      const ri=t.destinations.findIndex(x=>x.id===place.refId);
      if(ri>=0) idx=place.where==='before'?ri:ri+1;
    }
    t.destinations.splice(idx,0,d);
    UI.destId=d.id; UI.dayId=null;
  }
  save('נשמר'); closeSheet(); render();
}
async function deleteDest(id){
  closeSheet();
  const ok=await confirmDialog('היעד וכל הימים והאירועים שבו יימחקו.',true);
  if(!ok) return;
  const t=activeTrip();
  const i=t.destinations.findIndex(d=>d.id===id);
  if(i<0) return;
  const prev=t.destinations[i-1]||null, next=t.destinations[i+1]||null;
  const removed=t.destinations[i];
  const wasFlush=prev && next &&
    addDays(prev.endDate,1)===removed.startDate &&
    addDays(removed.endDate,1)===next.startDate;
  t.destinations.splice(i,1);
  if(UI.destId===id){
    UI.destId=(prev||next)?(prev||next).id:null;
    UI.dayId=null;
  }
  if(wasFlush){
    const delta=diffDays(prev.endDate, next.startDate)-1;
    if(delta>0){
      const close=await confirmDialog('נוצר חור של '+delta+' ימים בתאריכים. להקדים את היעדים הבאים כדי לסגור אותו? (האירועים זזים יחד עם הימים)');
      if(close){
        for(let k=i;k<t.destinations.length;k++) shiftDestDays(t.destinations[k], -delta);
      }
    }
  }
  save('היעד נמחק'); render();
}

function pickEvType(t){

    const day=currentDay();
    closeSheet(); openHotelForm(null, day?day.date:null); return;

  window.__evType=t;
  document.querySelectorAll('#typeGrid .type-cell').forEach(c=>c.classList.toggle('sel',c.dataset.t===t));

function saveEventForm(id, again){
  const day=currentDay(); if(!day) return;
  const g=x=>document.getElementById(x).value;
  const title=g('ef-title').trim();
  if(!title){ toast('תן כותרת לאירוע'); return; }
  const data={ type:window.__evType, title,
    time:g('ef-time'), duration:g('ef-dur'), address:g('ef-addr').trim(),
    estCost:g('ef-est'), actualCost:g('ef-act'),
    website:g('ef-web').trim(), phone:g('ef-phone').trim(),
    bookingRef:g('ef-book').trim(), priority:g('ef-pri'),
    notes:g('ef-notes') };
  if(id){
    Object.assign(day.events.find(x=>x.id===id), data);
    sortDayEvents(day);
    save('נשמר'); closeSheet(); refreshDay();
    return;
  }
  day.events.push(Object.assign({id:uid(), status:'upcoming', favorite:false}, data));
  sortDayEvents(day);

    const keepType=window.__evType;
    save('"'+title+'" נוסף ✓');
    refreshDay();
    openEventForm(null, keepType);
    const ti=document.getElementById('ef-title');
    if(ti) ti.focus();

    save('נשמר'); closeSheet(); refreshDay();

function openEventDetail(id){
  const day=currentDay(); if(!day) return;
  const e=day.events.find(x=>x.id===id); if(!e) return;
  const t=evType(e.type);
  const rows=[];
  if(e.time) rows.push(['שעה', esc(e.time)+(e.duration?' · '+fmtMin(+e.duration):'')]);
  else if(e.duration) rows.push(['משך', fmtMin(+e.duration)]);
  if(e.address) rows.push(['כתובת', esc(e.address)]);
  if(e.estCost) rows.push(['עלות משוערת', money(+e.estCost)]);
  if(e.actualCost) rows.push(['עלות בפועל', money(+e.actualCost)]);
  if(e.bookingRef) rows.push(['מס׳ הזמנה', esc(e.bookingRef)]);
  if(e.phone) rows.push(['טלפון', `<a href="tel:${esc(e.phone)}" style="color:var(--accent-ink)">${esc(e.phone)}</a>`]);
  if(e.priority==='high') rows.push(['עדיפות','⭐ חובה']);
  if(e.priority==='low') rows.push(['עדיפות','אם יישאר זמן']);

  if(e.address){

    ${e.notes?`<div class="card pad" style="margin-top:14px;background:var(--card2);font-size:14px;white-space:pre-wrap;">${esc(e.notes)}</div>`:''}
    ${links.length?`<div class="link-row">${links.join('')}</div>`:''}

      <button class="btn ${e.favorite?'btn-primary':'btn-ghost'}" onclick="toggleEvFav('${e.id}')">${ic('star',17)} ${e.favorite?'מועדף ✓':'מועדף'}</button>
    </div>
    <div class="row2" style="margin-bottom:10px">
      <button class="btn btn-ghost" onclick="closeSheet(); openEventForm('${e.id}')">${ic('pen',17)} עריכה</button>
      <button class="btn btn-ghost" onclick="setEvStatus('${e.id}','${e.status==='cancelled'?'upcoming':'cancelled'}')">${ic('x',17)} ${e.status==='cancelled'?'בטל ביטול':'סמן כבוטל'}</button>

function setEvStatus(id,st){
  const day=currentDay(); const e=day.events.find(x=>x.id===id); if(!e) return;
  e.status=st; save('עודכן'); closeSheet(); refreshDay();
}
function toggleEvFav(id){
  const day=currentDay(); const e=day.events.find(x=>x.id===id); if(!e) return;
  e.favorite=!e.favorite; save(); closeSheet(); refreshDay();
}
function deleteEvent(id){
  const t=activeTrip(); if(!t) return;
  let loc=null;
  (t.destinations||[]).forEach(d=>(d.days||[]).forEach(dy=>{
    const i=(dy.events||[]).findIndex(e=>e.id===id);
    if(i>=0) loc={dy,i,ev:dy.events[i]};
  }));
  if(!loc) return;
  closeSheet();
  loc.dy.events.splice(loc.i,1);
  save(); refreshDay();
  Undo.show('האירוע "'+(loc.ev.title||'ללא שם')+'" נמחק', ()=>{
    loc.dy.events.splice(Math.min(loc.i, loc.dy.events.length), 0, loc.ev);
    save('שוחזר ✓'); refreshDay();
  });
}

  const q=UI.docSearch.trim().toLowerCase();

    (UI.docFolder==='all' || (UI.docFolder==='fav'? d.fav : d.folder===UI.docFolder)) &&

    return html+emptyState('folder','אין עדיין מסמכים','העלה אישורי טיסות, הזמנות מלון, כרטיסים וביטוח — והכל יהיה זמין גם בדרכים',

function openUploadSheet(){
  const tripOpts=S.trips.map(t=>`<option value="${t.id}" ${t.id===S.activeTripId?'selected':''}>${esc(t.name)}</option>`).join('');
  openSheet('העלאת מסמך', `

async function doUpload(){
  const f=document.getElementById('up-file').files[0];
  if(!f){ toast('בחר קובץ'); return; }
  if(f.size>3.5*1048576){ toast('הקובץ גדול מ-3.5MB'); return; }
  const btn=document.getElementById('up-btn');
  btn.disabled=true; btn.textContent='מעלה…';
  try{
    const dataUrl=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read fail'));
      r.readAsDataURL(f);
    });
    const id=uid();
    const stored=await FileStore.put('tp-doc-'+id, dataUrl);
    S.docs.push({id, key:'tp-doc-'+id, name:f.name,

async function openDoc(id, download){
  const d=S.docs.find(x=>x.id===id); if(!d) return;
  try{
    const val=await FileStore.get(d.key);
    if(!val){ toast('הקובץ לא נמצא'); return; }
    const parts=val.split(',');
    const mime=(parts[0].match(/:(.*?);/)||[])[1]||'application/octet-stream';
    const bin=atob(parts[1]);
    const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([u8],{type:mime}));
    if(download){
      const a=document.createElement('a'); a.href=url; a.download=d.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),60000);
      return;
    }
    let inner='';
    if(mime.startsWith('image/'))
      inner=`<img src="${url}" alt="" style="width:100%;border-radius:14px;border:1px solid var(--line)">`;
    else if(mime==='application/pdf')
      inner=`<iframe src="${url}" style="width:100%;height:62vh;border:1px solid var(--line);border-radius:14px;background:#fff"></iframe>`;
    else
      inner=`<div class="empty" style="padding:34px 10px"><div class="e-ic">${ic('file',28)}</div><p>אין תצוגה מקדימה לסוג הקובץ הזה — אפשר להוריד אותו</p></div>`;
    openSheet(esc(d.name), inner+`
      <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="openDoc('${d.id}',true)">${ic('download',18)} הורדה / שיתוף</button>`,
      {onClose:()=>URL.revokeObjectURL(url)});
  }catch(e){ console.error(e); toast('הפתיחה נכשלה'); }
}

function budgetData(t){
  const cats={}; BUDGET_CATS.forEach(c=>cats[c.id]={est:0,act:0});
  const daily={};
  allEvents(t).forEach(({e,day})=>{
    const cat=evType(e.type).bcat;
    cats[cat].est+=(+e.estCost||0);
    cats[cat].act+=(+e.actualCost||0);
    if(+e.actualCost) daily[day.date]=(daily[day.date]||0)+(+e.actualCost);
  });
  (t.hotels||[]).forEach(b=>{ if(+b.price) cats.hotels.est+=(+b.price); });
  t.expenses.forEach(x=>{
    cats[x.category||'misc'].act+=(+x.amount||0);
    if(x.date) daily[x.date]=(daily[x.date]||0)+(+x.amount||0);
  });
  const est=Object.values(cats).reduce((s,c)=>s+c.est,0);
  const act=Object.values(cats).reduce((s,c)=>s+c.act,0);
  return {cats, est, act, daily};
}

    <circle class="fgc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="8"
      stroke="${color}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}"
      stroke-dashoffset="${(c*(1-Math.min(1,Math.max(0,pct)))).toFixed(1)}"/>
  </svg>`;
}
function screenStats(){
  const t=activeTrip();

  const d=tripDates(t);
  const evs=allEvents(t).map(x=>x.e);
  const b=budgetData(t);
  const packAll=t.packing.flatMap(l=>l.items);
  const packPct=packAll.length?Math.round(packAll.filter(i=>i.checked).length/packAll.length*100):0;

    const max=Math.max(...activeCats.map(c=>Math.max(b.cats[c.id].act,b.cats[c.id].est)),1);

    <div class="card pad"><div style="display:flex;align-items:flex-end;gap:5px;height:90px">

        <span style="font-size:9.5px;color:var(--ink3)">${fmtD(k,{day:'numeric',month:'numeric'})}</span>
      </div>`).join('')}
    </div></div>`;
  }

  /* transportation usage */
  const transTypes=['flight','train','metro','bus','taxi','car','bike','walk'];
  const trans=transTypes.map(id=>({t:evType(id),n:count(id)})).filter(x=>x.n);
  if(trans.length){
    const maxT=Math.max(...trans.map(x=>x.n),1);
    html+=`<div class="section-label">${ic('train',14)} שימוש בתחבורה</div><div class="card pad">`;

  const cards=[
    {n: cd>0?cd:(diffDays(todayStr(),d.end)>=0?'עכשיו':'—'), l:cd>0?'ימים ליציאה':'סטטוס הטיול', ico:'clock', c:'#3E63DD'},

  ];
  html+=`<div class="section-label">${ic('chart',14)} מספרים</div>
  <div class="stat-grid">${cards.map(c=>`
    <div class="stat-card">
      <div class="s-ic" style="background:${c.c}1e;color:${c.c}">${ic(c.ico,18)}</div>
      <div class="s-num">${c.n}</div><div class="s-lbl">${c.l}</div>
    </div>`).join('')}</div>`;
  return html;
}

function exportData(){

  a.download='גיבוי-טיולים-'+todayStr()+'.json';

function importData(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const p=JSON.parse(r.result);
      if(!p||!Array.isArray(p.trips)) throw new Error('bad');
      const ok=await confirmDialog('הייבוא יחליף את כל הנתונים הקיימים. להמשיך?',true);
      if(!ok) return;
      S=p; if(!S.docs) S.docs=[];
      applyTheme(); save('הנתונים שוחזרו'); render();
    }catch(e){ toast('קובץ לא תקין'); }
  };
  r.readAsText(f);
}
async function wipeAll(){
  const ok=await confirmDialog('כל הטיולים, האירועים והמסמכים יימחקו לצמיתות. בטוח?',true);
  if(!ok) return;
  for(const d of S.docs){ await FileStore.del(d.key); }
  await Store.del(SKEY);
  S={v:1, settings:{theme:S.settings.theme,currency:'₪'}, activeTripId:null, trips:[], docs:[]};

}

          const ty=evType(e.type);

            act:`gsGoEvent('${t.id}','${dst.id}','${day.id}')`});

      }));
    });
    t.packing.forEach(l=> l.items.forEach(i=>{
      if(i.name.toLowerCase().includes(q))
        out.push({ic:'bag',c:'#12946A',title:i.name,sub:'אריזה · '+l.name,act:`gsGoPack('${t.id}','${l.id}')`});

      out.push({ic:'file',c:'#7A8699',title:d.name,sub:'מסמך',act:`closeSheet(); openDoc('${d.id}',false)`});
  });

      <span class="lr-ic" style="background:${r.c}1e;color:${r.c}">${ic(r.ic,18)}</span>

}

<script>
/* ==== SERVICES ==== */
function hsh(s){ let h=0; s=String(s||''); for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }

/* trip progress — "Day X of Y" */
function tripProgress(t){
  const d=tripDates(t);
  const total=Math.max(1,diffDays(d.start,d.end)+1);
  const passed=diffDays(d.start,todayStr())+1;
  let status='upcoming';
  if(passed>=1 && passed<=total) status='ongoing';
  else if(passed>total) status='ended';
  return {total, current:Math.min(Math.max(passed,0),total), status, start:d.start, end:d.end};
}

/* Flight status — demo provider */
const FlightService={
  provider:'demo',
  status(flightNo,dateStr){
    const h=hsh(String(flightNo)+String(dateStr));
    const opts=[['בזמן','var(--green)'],['בזמן','var(--green)'],['עיכוב קל','var(--amber)'],['בהמתנה לשער','var(--accent)']];
    return {label:opts[h%4][0], color:opts[h%4][1]};
  }
};

/* Smart reminders — derived automatically from the itinerary (push APIs to be wired later) */
function buildReminders(trip){
  const out=[];
  const push=(id,icon,color,date,time,title,sub)=>out.push({id,icon,color,date,time:time||'',title,sub});
  trip.destinations.forEach(dest=>dest.days.forEach(day=>day.events.forEach(e=>{
    if(e.status==='cancelled') return;
    if(e.type==='flight') push('fl-'+e.id,'flight','#3E63DD',day.date,e.time,'טיסה: '+e.title,'להתייצב ~3 שעות לפני');
    else if(e.type==='train') push('tr-'+e.id,'train','#0E9BB5',day.date,e.time,'רכבת: '+e.title,'לצאת מוקדם לתחנה');
    else if(e.type==='hotel') push('ht-'+e.id,'hotel','#8250DF',day.date,e.time||'15:00','צ׳ק-אין: '+e.title,e.bookingRef?('הזמנה '+e.bookingRef):'');
    else if(e.type==='restaurant'&&e.time) push('rs-'+e.id,'food','#E8590C',day.date,e.time,'הזמנה: '+e.title,'לצאת ~שעה לפני');
    else if(e.priority==='high'&&e.time) push('ac-'+e.id,'spark','#12946A',day.date,e.time,e.title,'פעילות חובה');
  })));
  (trip.hotels||[]).forEach(b=>push('hb-'+b.id,'hotel','#8250DF',b.checkIn,b.checkInTime||'15:00','צ׳ק-אין: '+b.name,b.bookingRef?('הזמנה '+b.bookingRef):''));
  const d=tripDates(trip);
  push('pass-'+trip.id,'ticket','#6741D9',addDays(d.start,-14),'','לבדוק דרכון וויזה','תוקף דרכון 6 חודשים לפחות');
  push('pack-'+trip.id,'bag','#12946A',addDays(d.start,-2),'','להתחיל לארוז','שני ימים ליציאה');
  (trip.customReminders||[]).forEach(r=>push('cu-'+r.id,'bell','#E8590C',r.date,r.time,r.title,'תזכורת אישית'));
  out.sort((a,b)=> a.date===b.date ? (a.time||'99:99').localeCompare(b.time||'99:99') : (pd(a.date)-pd(b.date)));
  return out;
}

/* Assistant — local rules engine; LLM hookup goes in Assistant.ask() later */
const Assistant={
  provider:'rules',
  async ask(){ return null; }, /* future: AI suggestions (attractions, restaurants, optimization) */
  analyze(trip){
    const ins=[];
    const today=todayStr();
    trip.destinations.forEach(dest=>dest.days.forEach(day=>{
      /* schedule conflicts */
      const timed=day.events.filter(e=>e.time&&e.status!=='cancelled')
        .map(e=>({e,start:e.time,mins:(+e.time.slice(0,2))*60+(+e.time.slice(3,5)),dur:+e.duration||60}))
        .sort((a,b)=>a.mins-b.mins);
      for(let i=1;i<timed.length;i++){
        if(timed[i].mins < timed[i-1].mins+timed[i-1].dur){
          ins.push({icon:'alert',color:'var(--red)',sev:0,
            title:'התנגשות בלו״ז · '+fmtD(day.date),
            text:'"'+timed[i-1].e.title+'" עדיין רץ כש-"'+timed[i].e.title+'" מתחיל ('+timed[i].start+')',
            dayId:day.id, destId:dest.id});
        }
        else if(timed[i].mins - (timed[i-1].mins+timed[i-1].dur) > 240){
          ins.push({icon:'clock',color:'var(--amber)',sev:2,
            title:'חלון פנוי גדול · '+fmtD(day.date),
            text:'יותר מ-4 שעות בין "'+timed[i-1].e.title+'" ל-"'+timed[i].e.title+'" — הזדמנות למשהו מהרשימה',
            dayId:day.id, destId:dest.id});
        }
      }
      /* empty future day */
      if(!day.events.length && day.date>=today){
        ins.push({icon:'spark',color:'var(--accent)',sev:3,
          title:'יום פנוי · '+fmtD(day.date)+' ב'+(dest.name||'יעד'),
          text:(trip.wishlist&&trip.wishlist.length)?'יש '+trip.wishlist.length+' מקומות ברשימת המשאלות שמחכים לשיבוץ':'אפשר לתכנן כאן משהו',
          dayId:day.id, destId:dest.id});
      }
      /* night without a hotel */
      const dTrip=tripDates(trip);
      if(day.date!==dTrip.end && day.date>=today){
        const hasHotel=hotelCoversNight(trip,day.date) || trip.destinations.some(dd=>dd.days.some(x=>x.date===day.date&&x.events.some(e=>e.type==='hotel'&&e.status!=='cancelled')));
        if(!hasHotel && day.events.length)
          ins.push({icon:'hotel',color:'#8250DF',sev:1,
            title:'אין לינה ל-'+fmtD(day.date),
            text:'לא מסומן מלון ללילה הזה — אם כבר הוזמן, כדאי להוסיף אותו למסלול',
            dayId:day.id, destId:dest.id});
      }
    }));
    /* budget overrun */
    if(trip.budgetTotal){
      let act=0;
      trip.destinations.forEach(d=>d.days.forEach(day=>day.events.forEach(e=>act+=(+e.actualCost||0))));
      (trip.expenses||[]).forEach(x=>act+=(+x.amount||0));
      if(act>trip.budgetTotal)
        ins.push({icon:'wallet',color:'var(--red)',sev:0,title:'חריגה מהתקציב',
          text:'הוצאת '+Math.round(act)+' מתוך תקציב של '+trip.budgetTotal});
      else if(act>trip.budgetTotal*0.85)
        ins.push({icon:'wallet',color:'var(--amber)',sev:1,title:'מתקרבים לתקרת התקציב',
          text:'נוצלו '+Math.round(act/trip.budgetTotal*100)+'% מהתקציב'});
    }
    ins.sort((a,b)=>(a.sev??5)-(b.sev??5));
    return ins;
  }
};
/* hotel bookings — one object, spans a date range */
function hotelNights(b){ return Math.max(0, diffDays(b.checkIn, b.checkOut)); }
function hotelsForDate(t,date){ return (t.hotels||[]).filter(b=>b.checkIn<=date && date<=b.checkOut); }
function hotelCoversNight(t,date){ return (t.hotels||[]).some(b=>b.checkIn<=date && date<b.checkOut); }
function hotelDayMode(b,date){
  if(date===b.checkIn && date===b.checkOut) return 'inout';
  if(date===b.checkIn) return 'in';
  if(date===b.checkOut) return 'out';
  return 'stay';
}
function applyPlanOrder(t, orderMap){
  const all={};
  (t.destinations||[]).forEach(d=>(d.days||[]).forEach(dy=>(dy.events||[]).forEach(e=>{ all[e.id]=e; })));
  const placed=new Set();
  Object.keys(orderMap).forEach(dayId=>(orderMap[dayId]||[]).forEach(id=>placed.add(id)));
  (t.destinations||[]).forEach(d=>(d.days||[]).forEach(dy=>{
    if(orderMap[dy.id]) dy.events=(orderMap[dy.id]||[]).map(id=>all[id]).filter(Boolean);
    else dy.events=(dy.events||[]).filter(e=>!placed.has(e.id));
  }));
  return t;
}
function sortDayEvents(day){
  /* stable: timed events ascending; untimed keep their manual order at the end */
  day.events.sort((a,b)=>String(a.time||'99:99').localeCompare(String(b.time||'99:99')));
}
function shiftDestDays(dest, delta){
  if(!delta) return;
  dest.startDate=addDays(dest.startDate, delta);
  dest.endDate=addDays(dest.endDate, delta);
  (dest.days||[]).forEach(day=>{ day.date=addDays(day.date, delta); });
}

    t.destinations.forEach(d=>d.days.forEach(day=>{
      if(!day.journal) day.journal={notes:'',mood:null,rating:0,photos:[]};
    }));

}
function findDay(dayId){
  const t=activeTrip(); if(!t) return null;
  for(const dest of t.destinations){ const day=dest.days.find(x=>x.id===dayId); if(day) return {day,dest,trip:t}; }
  return null;
}
function findEvent(evId){
  const t=activeTrip(); if(!t) return null;
  for(const dest of t.destinations) for(const day of dest.days){
    const e=day.events.find(x=>x.id===evId); if(e) return {e,day,dest};
  }
  return null;
}

function compressImage(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onerror=()=>rej(new Error('read'));
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1280, sc=Math.min(1, max/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.82));
      };
      img.onerror=()=>rej(new Error('img'));
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}
async function jAddPhoto(dayId,input){
  const file=input.files[0]; if(!file) return;
  const f=findDay(dayId); if(!f) return;
  try{

    const dataUrl=await compressImage(file);
    const id=uid(), key='tp-photo-'+id;
    await FileStore.put(key,dataUrl);
    f.day.journal.photos.push({id,key});
    UI.jOpen.add(dayId);
    save('התמונה נוספה ליומן'); render();
  }catch(e){ console.error(e); toast('הוספת התמונה נכשלה'); }

async function jDelPhoto(dayId,photoId){

  const today=todayStr(); const n=new Date();
  const hm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');

  allEvents(t).forEach(({e,day,dest})=>{
    if(e.status==='cancelled'||e.status==='done') return;
    let key=null;

    </div></div>`;
